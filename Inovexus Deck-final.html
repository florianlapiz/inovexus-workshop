  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html lang=\"en\" style=\"--orange: #FF8A3D; --magenta: #B6428C; --indigo: #2B1A4A;\"><head>\n\n\n<meta charset=\"utf-8\">\n<title>Inovexus — Overview<\u002Ftitle>\n<script src=\"504484ca-6dca-45c3-a522-aac2e048ccf4\"><\u002Fscript>\n<script type=\"application/json\" id=\"speaker-notes\">\n[\n  \"Ganz kurz zu mir, damit ihr wisst, woher ich komme. Ich bin Florian, GTM Engineer. Ich arbeite primär mit early-stage B2B SaaS Teams an ihrer Outbound-Motion. Der konkrete Schmerzpunkt, den ich löse, ist der Übergang von founder-led zu systematisch. — Die 60 Minuten sehen so aus: erste 20 Minuten Strategie und Stack. Dann 13 Minuten drei konkrete Plays mit Email-Beispielen. Dann 20 Minuten für eure Fragen. Letzte 7 Minuten Zusammenfassung und ein Angebot. — Was ihr mitnehmt: Framework, Stack-These, drei Plays. Was das nicht ist: ein Tool-Tutorial oder eine Copywriting-Klasse.\",\n  \"OK, der grundlegende Shift. Bei euren ersten zehn Kunden habt ihr wahrscheinlich mit einer Person gesprochen — Founder oder Head of X. Das ist fein. Ab Mid-Market ändert sich das fundamental. Fünf Personas: Champion will, dass der Deal durchgeht. Economic Buyer hat das Budget. Technical Buyer bewertet das Tool. End User nutzt es. Blocker — InfoSec, Legal, Procurement — kann nein sagen. Zwei Regeln: multi-threadet ab Tag eins, wartet nicht bis der Champion intern pitcht. Und jede Persona braucht eine andere Message — gleicher Account, fünf Framings.\",\n  \"Alright, let's open with the problem this workshop exists to solve. Most of you in the room have done something really hard already — you got your first ten customers. Probably through pure founder hustle. You sent the emails yourselves, you leaned on your network, you told your story over and over. That's real, and it's worth acknowledging. But here's the uncomfortable truth: the next hundred customers will not come the same way. The playbook that got you here will not get you there, and in many cases it will actively work against you. The next forty-five minutes are about the transition — expanding TAM, prioritizing accounts, shifting messaging, and multi-threading deals. We'll talk about strategy first. Tools come second.\",\n  \"Wir starten mit dem strategischen Teil. Die nächsten vier Slides sind Frameworks, die drei danach zur Tool-Landschaft. Erst in Part 2 wird's konkret mit echten Plays. Kurze Orientierung — dann geht's los.\",\n  \"Gründer denken meist linear: SMB → Mid-Market → Enterprise. Das ist nur eine Expansions-Richtung. Es gibt drei: Size, Vertical, Use-case. Der non-obvious Move — testet zwei Vectors parallel, nicht sequenziell. 50 Accounts pro Vector, nach 60 Tagen den schwächeren killen. Doppelt so schnell lernen, 1,5x die Kosten.\",\n  \"SMB funktioniert mit Firmographics. Ab Mid-Market braucht ihr Signale. Vier Kategorien: Growth, Buying, Pain, Timing. Die Regel: wenn ihr keine drei Signale auf einem Account habt, fasst ihn nicht an. Enterprise-Accounts kosten 2-4 Wochen Arbeit. Das falsche Picking kostet einen Monat. Das richtige dreifacht eure Hit Rate.\",\n  \"Die Math-Realität: ihr geht NICHT upmarket, indem ihr 10x Volume macht. Ihr reduziert Volume um 95% und geht tiefer. SMB 1000 Accounts für 10K ARR. Enterprise 50 Accounts für 187K ARR. Der kritische Moment — Monat 2 bis 4. Da sterben die meisten Deals. Nicht weil das Angebot schlecht ist, sondern weil ihr aufhört zu zeigen. Der Hebel: baut Assets, nicht Emails.\",\n  \"Die Frage ist nicht welches Tool. Die Frage ist: welcher Teil eures Stacks wird gerade von AI-Primitives gegessen. Zwei Shifts auf dem Radar: Claude Code ersetzt einen Großteil der Enrichment-Arbeit ab 500 Accounts. Exa.ai ersetzt Keyword-Search durch semantische Search — ihr sucht nicht mehr nach Datenfeldern, sondern nach Zuständen. Baut composable, nicht monolithisch.\",\n  \"Genug Theorie. Ab jetzt wird's konkret. Drei Plays, jeder mit eigenem Startup-Beispiel, eigenem Signal-Stack, eigenem Cold-Email-Template. Die Namen könnt ihr euch notieren, die Plays könnt ihr ab Montag nutzen.\",\n  \"HR-Tech-Startup, 50 SMB-Kunden, ACV 3K. Wollen ins Mid-Market, Ziel 15-30K. Erste Erkenntnis: der SMB-ICP funktioniert nicht. Anderer Buyer, andere Pains, andere Budget-Argumentation. Dann der Signal-Stack — Funding plus Hiring plus Stack Gap. Jedes Signal allein zu generisch. Die Kombination ist ein Timing-Fenster von 30-60 Tagen. Am Ende: 25 Accounts statt 10.000. Jede Info in der Email kommt aus dem Signal-Stack.\",\n  \"Die meisten Founder, die in Hotels verkaufen, pitchen den General Manager. Höchster Title pro Property, aber: der GM bekommt täglich 5-10 Vendor-Pitches. Pitch-fatigued, keine Sustainability-KPIs auf seinem Desk. Der bessere Move: den Champion identifizieren. Bei Hospitality ist das fast immer die Head of Sustainability oder Director of Engineering — jemand, dessen KPIs direkt an Sustainability-Outcomes hängen. Drei Signale: Sustainability Engagement auf LinkedIn, Role Stake (sind ESG-KPIs an der Rolle?), Innovation Track Record. AI-Research pro Stakeholder, Champion Score 0-30. Beispiel NUMA: traditional guess wäre der GM, Score 11. Actual Champion: Head of Sustainability, Score 28.\",\n  \"Observability-Startup, Enterprise E-Commerce Target, Champion schon identifiziert. Warum reicht das nicht? Bei 100K+ ACV stehen fünf Leute in der Entscheidung. Champion, Economic Buyer, Tech Buyer, End User, InfoSec-Blocker. Der Play: alle fünf direkt ansprechen, koordiniert über 2-3 Wochen. Jeder kriegt eine andere Message, ein anderes Subject, eine andere CTA. Plus Multi-Channel: Email öffnet, LinkedIn verstärkt, Warm Intro closed. Kein Substitut — Multiplier.\",\n  \"20 Minuten Dialog. Ich hab die vier Fragen von Blumana kurz vorab skizziert, damit wir nicht bei Null anfangen. Ich gehe sie in 10 Minuten durch — kurze Essenzen, dann vertiefen wir wo es für euch hängt. Pro Frage rund zwei Minuten: Kernaussage vorlesen, ein konkretes Beispiel, dann Raum für Rückfragen. Wer hat dazu was? Wenn niemand nachhakt, weiter zur nächsten. Danach 10 Minuten offen für euch — alles was übrig ist, egal ob zu den Plays oder zu eurer konkreten Situation.\",\n  \"Zweite Pre-submitted Frage von Blumana — Fokus: was braucht ihr wirklich im Stack? Die kurze Antwort: vier Tools, 500 bis 1500 Euro im Monat, der Rest ist meist ein Strategie-Problem im Tool-Kostüm. Clay macht Research und Signal-Stacking. Smartlead die Sequences und Deliverability. Attio als AI-native CRM. Und Claude — Pro Plan plus API — für Research, Copy und Workflows. Alles darüber hinaus — HubSpot Enterprise, Salesforce, Gong, drei Data-Provider parallel, Notion als CRM mit 100 Deals — kostet Zeit die ihr nicht habt. Monday-Action: audit am Wochenende. Wenn ihr über 1500 Euro im Monat seid — ein Tool rauswerfen.\",\n  \"Dritte pre-submitted Frage: Wo lohnt sich AI wirklich? Der relevanteste Agent ist der Account Research Agent. Input: 50 bis 100 Firmennamen. Der Agent scrapt die Website, zieht LinkedIn, holt News über Exa.ai der letzten 90 Tage, extrahiert Job Postings, prüft den Tech Stack, synthetisiert. Output pro Account: 3-Satz-Summary, drei Pain-Hypothesen nach Priorität, drei Relevance Signals, empfohlenes Buying Committee aus zwei bis fünf Rollen. Warum zuerst? Tool-agnostisch, skaliert von 10 auf 1000 Accounts mit gleichem Workflow, und eure Outbound-Qualität steigt messbar. Ein bis zwei Tage Setup, je nach Claude-Code-Erfahrung. Weitere Agenten — Qualification, Signal Monitoring — kommen danach. Die Regel: automatisiert nicht Sales selbst. Automatisiert Research, Qualification, Signal-Monitoring — das was Sales füttert. Menschen verkaufen. Monday-Action: vier Stunden blockieren, rohe Version auf 20 Accounts testen, shippen, nächste Woche iterieren.\",\n  \"Vierte Pre-submitted Frage: Enterprise und Upper Mid-Market. Die Antwort ist unbequem: im Seed-Stadium ist Enterprise keine Sales-Motion. Das ist Design Partnerships. Phase 1, Monate 1 bis 3: drei bis fünf Accounts bei 50 Prozent Rabatt, 12 Monate Commitment. Denkt das als R&D mit Umsatz, nicht als Sales. Ziel: drei signed Design Partners. Phase 2, Monate 4 bis 6: tief ausrollen, jede Objection dokumentieren, Case Studies hier schreiben, Produkt auf Enterprise-Feedback iterieren. Phase 3 ab Monat 7: jetzt erst systematisches Outbound, mit Play 3 skalieren. Cycle 6 bis 12 Monate pro Deal, Close Rate 15 bis 25 Prozent auf engagierte Accounts. Enterprise-Readiness vor Phase 1: SOC 2 Type I mit Roadmap für Type II, SSO über SAML oder OIDC, Pricing-Tier 3 bis 5 mal euer SMB-Preis. Und — wichtig — ein Founder committet sich drei bis sechs Monate voll auf Enterprise. SMB und Enterprise parallel geht im Seed nicht. Wählt die Motion. Monday-Action: diesen Monat fünf Enterprise-Accounts listen, die ihr wirklich als Design Partners wollt. Noch nicht anschreiben — die Liste selbst ist das Forcing Function.\",\n  \"Letzte Pre-submitted Frage: GTM-Team-Scaling. Kernregel: hiren am Trigger Point, nicht früher. Founder verkauft selbst bis 500K ARR. Jeder Hire davor ist verbranntes Geld. Von 0 bis 500K verkauft ihr — keine Hires. Bei 500K bis 1M Freelance-SDR als 3-Monats-Test, 2 bis 3K im Monat. Ab 1M ARR erster Full-Time SDR, 40 bis 60K plus Commission. Bei 2 bis 3M Senior AE als Sales Lead — nicht VP — 80 bis 120K plus Commission. Erst ab 5M ARR VP Sales plus Marketing und Customer Success. Top 3 Hiring-Fehler: erstens VP Sales zu früh — VPs multiplizieren Systeme. Kein System heißt sie kündigen in 12 Monaten. Wartet auf 3 bis 5M ARR. Zweitens SDRs outsourcen bevor ihr es selbst gemacht habt — dann verpasst ihr die 100 Objections, die ihr gehört haben müsst. Drittens Marketing Manager FTE bevor eine Content-Engine existiert — sie planen statt zu bauen. Monday-Action: ARR gegen die Map checken. Wer zu früh gehirt hat — das ist ein Fire-Fast-Moment. Slow-Hire ist günstig, Fast-Fire ist günstiger.\",\n  \"Drei Regeln zum Mitnehmen. Eine für Strategie, eine für Targeting, eine für Execution. Wenn ihr nach dem Workshop eins ins Journal schreibt, dann diese drei. Problem first, Tool second — ohne Problem-Verständnis hilft kein Tool. Stack drei Signale — Single-Signal ist crowded, drei Signale sind ein Fenster nur für euch. Multi-thread ab Tag eins — bei 25K+ ist ein Kontakt pro Account euer Pipeline-Deckel.\",\n  \"Drei Dinge zum Abschluss. Erstens: jeder von euch kriegt 45 Minuten 1:1 Zeit mit mir — kein Pitch, keine Sales-Runde. Wir schauen uns euren Pipeline-Plan an und skizzieren eine erste Kampagne. Zweitens: wenn das nützlich ist, gibt's über Inovexus Partner Perks rabattierte Folge-Pakete. Drittens, und das ist mir wichtig: kein Druck, keine Deadline. Bucht wenn's passt. Danke für eure Aufmerksamkeit — und besonders für die Qualität der Fragen.\"\n]\n<\u002Fscript>\n<style>\n  :root {\n    --bg: #0A0A0C;\n    --fg: #F5F1EA;\n    --muted: rgba(245, 241, 234, 0.62);\n    --dim: rgba(245, 241, 234, 0.38);\n    --line: rgba(245, 241, 234, 0.12);\n    --orange: #FF8A3D;\n    --magenta: #B6428C;\n    --indigo: #2B1A4A;\n    --blue: #6AA8E0;\n  }\n  html, body { margin: 0; background: #000; }\n  body {\n    font-family: \"Helvetica Neue\", Helvetica, Arial, sans-serif;\n    font-weight: 400;\n    letter-spacing: -0.01em;\n    color: var(--fg);\n    -webkit-font-smoothing: antialiased;\n  }\n  deck-stage { font-family: inherit; }\n\n  /* Shared slide scaffolding */\n  section.slide {\n    background: var(--bg);\n    color: var(--fg);\n    padding: 100px 120px;\n    display: flex;\n    flex-direction: column;\n    position: relative;\n    overflow: hidden;\n  }\n  /* Safe clearance for top chrome and bottom page number — applies over any inline padding via explicit vertical overrides on children if needed */\n  section.slide {\n    padding-top: max(88px, var(--slide-pad-top, 100px));\n    padding-bottom: max(88px, var(--slide-pad-bot, 100px));\n  }\n  section.slide.warm {\n    background:\n      radial-gradient(1400px 900px at 10% 45%, rgba(255, 138, 61, 0.55) 0%, rgba(255, 138, 61, 0) 55%),\n      radial-gradient(1100px 900px at 55% 60%, rgba(182, 66, 140, 0.45) 0%, rgba(182, 66, 140, 0) 60%),\n      radial-gradient(900px 900px at 95% 30%, rgba(43, 26, 74, 0.6) 0%, rgba(43, 26, 74, 0) 65%),\n      #0A0A0C;\n  }\n  section.slide.sunset {\n    background:\n      radial-gradient(1800px 1100px at 50% 60%, rgba(255, 138, 61, 0.85) 0%, rgba(255, 138, 61, 0) 55%),\n      radial-gradient(1200px 900px at 80% 30%, rgba(182, 66, 140, 0.55) 0%, rgba(182, 66, 140, 0) 60%),\n      radial-gradient(900px 900px at 15% 75%, rgba(106, 168, 224, 0.25) 0%, rgba(106, 168, 224, 0) 65%),\n      #0A0A0C;\n  }\n\n  /* Diagonal angled-line motif from brand */\n  .diag-lines {\n    position: absolute;\n    inset: 0;\n    pointer-events: none;\n    overflow: hidden;\n  }\n  .diag-lines::before,\n  .diag-lines::after {\n    content: \"\";\n    position: absolute;\n    left: -10%;\n    width: 140%;\n    height: 1px;\n    background: rgba(245, 241, 234, 0.08);\n    transform: rotate(-18deg);\n    transform-origin: left center;\n  }\n  .diag-lines::before { top: 38%; }\n  .diag-lines::after  { top: 72%; background: rgba(245, 241, 234, 0.05); }\n\n  /* Brand lockup */\n  .brand {\n    font-weight: 900;\n    font-stretch: condensed;\n    letter-spacing: 0.08em;\n    font-size: 24px;\n  }\n  .brand-logo {\n    height: 24px;\n    width: auto;\n    display: block;\n    filter: brightness(0) invert(1);\n  }\n  .brand-logo.dark {\n    filter: none;\n  }\n  .slide-chrome {\n    position: absolute;\n    top: 32px;\n    left: 56px;\n    right: 56px;\n    display: flex;\n    justify-content: space-between;\n    align-items: center;\n    color: var(--muted);\n    font-size: 18px;\n    letter-spacing: 0.16em;\n    text-transform: uppercase;\n    z-index: 5;\n  }\n  .slide-chrome .sec { font-weight: 500; color: var(--dim); }\n\n  /* Footer page number */\n  .page-num {\n    position: absolute;\n    bottom: 32px;\n    right: 56px;\n    font-variant-numeric: tabular-nums;\n    font-size: 18px;\n    letter-spacing: 0.14em;\n    color: var(--dim);\n    font-weight: 500;\n    z-index: 5;\n  }\n  section.slide.sunset .page-num { color: rgba(10,10,12,0.55); }\n\n  /* Type */\n  h1.display {\n    font-size: 128px;\n    line-height: 0.95;\n    font-weight: 900;\n    letter-spacing: -0.035em;\n    margin: 0;\n  }\n  h1.title {\n    font-size: 96px;\n    line-height: 1.02;\n    font-weight: 900;\n    letter-spacing: -0.03em;\n    margin: 0 0 56px 0;\n    max-width: 1500px;\n  }\n  h2.subtitle {\n    font-size: 56px;\n    line-height: 1.08;\n    font-weight: 700;\n    letter-spacing: -0.02em;\n    margin: 0;\n  }\n  p.body, li.body {\n    font-size: 34px;\n    line-height: 1.38;\n    font-weight: 400;\n    color: var(--fg);\n    margin: 0;\n    letter-spacing: -0.005em;\n  }\n  p.lede {\n    font-size: 40px;\n    line-height: 1.32;\n    font-weight: 400;\n    color: var(--fg);\n    letter-spacing: -0.01em;\n    margin: 0;\n    max-width: 1400px;\n  }\n  .eyebrow {\n    font-size: 24px;\n    letter-spacing: 0.22em;\n    text-transform: uppercase;\n    color: var(--muted);\n    font-weight: 600;\n    margin: 0 0 40px 0;\n  }\n  .small { font-size: 24px; line-height: 1.4; color: var(--muted); }\n\n  .fg-gradient {\n    background: linear-gradient(100deg, #FFB37A 0%, #FF8A3D 25%, #D95D8E 55%, #7A4AA8 85%);\n    -webkit-background-clip: text;\n    background-clip: text;\n    color: transparent;\n  }\n\n  /* Placeholder \"portrait\" with sunset gradient (original design, not copying real photos) */\n  .portrait {\n    width: 100%;\n    aspect-ratio: 3 / 4;\n    border-radius: 18px;\n    position: relative;\n    overflow: hidden;\n    background:\n      linear-gradient(180deg, rgba(10,10,12,0) 40%, rgba(10,10,12,0.88) 100%),\n      linear-gradient(160deg, #FFB37A 0%, #FF8A3D 30%, #B6428C 65%, #2B1A4A 100%);\n    box-shadow: 0 30px 60px rgba(0,0,0,0.35);\n  }\n  .portrait .silhouette {\n    position: absolute; inset: 0;\n    background:\n      radial-gradient(ellipse 22% 30% at 50% 32%, rgba(10,10,12,0.7) 0%, rgba(10,10,12,0) 60%),\n      radial-gradient(ellipse 45% 40% at 50% 88%, rgba(10,10,12,0.75) 0%, rgba(10,10,12,0) 70%);\n  }\n  .portrait .mono {\n    position: absolute;\n    left: 16px; bottom: 14px;\n    font-family: ui-monospace, \"SF Mono\", Menlo, monospace;\n    font-size: 14px;\n    color: rgba(245, 241, 234, 0.55);\n    letter-spacing: 0.04em;\n  }\n  .mentor-card {\n    display: flex;\n    flex-direction: column;\n    gap: 16px;\n  }\n  .mentor-card .name { font-size: 26px; font-weight: 700; letter-spacing: -0.01em; }\n  .mentor-card .role { font-size: 22px; color: var(--muted); line-height: 1.35; }\n  .flag {\n    display: inline-block;\n    width: 22px; height: 14px;\n    vertical-align: 1px;\n    margin-left: 8px;\n    border-radius: 2px;\n    background: linear-gradient(90deg, #CE2B37 33%, #F1F1F1 33% 66%, #009246 66%);\n  }\n  .flag.fr { background: linear-gradient(90deg, #0055A4 33%, #F1F1F1 33% 66%, #EF4135 66%); }\n  .flag.us { background: linear-gradient(180deg, #B22234 0 14%, #fff 14% 28%, #B22234 28% 42%, #fff 42% 56%, #B22234 56% 70%, #fff 70% 84%, #B22234 84% 100%); position: relative;}\n  .flag.de { background: linear-gradient(180deg, #000 33%, #DD0000 33% 66%, #FFCE00 66%); }\n  .flag.pt { background: linear-gradient(90deg, #046A38 40%, #DA291C 40%); }\n  .flag.it { background: linear-gradient(90deg, #009246 33%, #F1F1F1 33% 66%, #CE2B37 66%); }\n\n  /* Portfolio tile */\n  .tile {\n    border-radius: 22px;\n    padding: 42px;\n    background: #15151A;\n    border: 1px solid var(--line);\n    min-height: 320px;\n    display: flex;\n    flex-direction: column;\n    justify-content: space-between;\n    position: relative;\n    overflow: hidden;\n  }\n  .tile .accent {\n    position: absolute;\n    inset: 0;\n    opacity: 0.9;\n    z-index: 0;\n  }\n  .tile .accent.a1 { background: linear-gradient(135deg, rgba(255,138,61,0.18), rgba(182,66,140,0.1) 60%, rgba(10,10,12,0) 100%); }\n  .tile .accent.a2 { background: linear-gradient(210deg, rgba(106,168,224,0.2), rgba(43,26,74,0.1) 70%); }\n  .tile .accent.a3 { background: linear-gradient(135deg, rgba(182,66,140,0.2), rgba(43,26,74,0.15)); }\n  .tile .t-inner { position: relative; z-index: 1; display: flex; flex-direction: column; justify-content: space-between; height: 100%; }\n  .tile h3 { font-size: 36px; font-weight: 800; margin: 0 0 12px 0; letter-spacing: -0.015em; }\n  .tile p  { font-size: 24px; line-height: 1.35; color: var(--muted); margin: 0; }\n  .tile .sector {\n    font-size: 24px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--dim); font-weight: 600;\n  }\n\n  /* Two-column layout */\n  .two { display: grid; grid-template-columns: 1fr 1fr; gap: 72px; flex: 1; align-content: start; }\n  .three { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; flex: 1; align-content: start; }\n\n  /* Numbered points */\n  .num-row { display: flex; gap: 36px; align-items: baseline; }\n  .num {\n    font-size: 64px;\n    font-weight: 900;\n    letter-spacing: -0.03em;\n    color: var(--fg);\n    min-width: 90px;\n    font-feature-settings: \"tnum\" 1;\n  }\n  .num.gradient {\n    background: linear-gradient(135deg, #FFB37A, #FF8A3D 35%, #B6428C 75%);\n    -webkit-background-clip: text; background-clip: text; color: transparent;\n  }\n\n  /* Stat slab */\n  .stat .fig {\n    font-size: 220px; font-weight: 900; line-height: 0.9; letter-spacing: -0.05em;\n  }\n  .stat .fig .suffix { font-size: 120px; vertical-align: 30px; }\n  .stat .label { font-size: 34px; color: var(--muted); margin-top: 24px; max-width: 900px; line-height: 1.35; }\n\n  /* Map dots */\n  .map-board {\n    position: relative;\n    flex: 1;\n    border-radius: 24px;\n    background:\n      radial-gradient(800px 600px at 50% 50%, rgba(255,138,61,0.16), rgba(10,10,12,0) 70%),\n      #0E0E12;\n    border: 1px solid var(--line);\n    overflow: hidden;\n  }\n  .map-grid {\n    position: absolute; inset: 0;\n    background-image:\n      linear-gradient(to right, rgba(245,241,234,0.04) 1px, transparent 1px),\n      linear-gradient(to bottom, rgba(245,241,234,0.04) 1px, transparent 1px);\n    background-size: 80px 80px;\n  }\n  .city { position: absolute; display: flex; flex-direction: column; align-items: flex-start; gap: 8px; transform: translate(-50%, -50%); }\n  .city .dot {\n    width: 14px; height: 14px; border-radius: 50%;\n    background: #FF8A3D;\n    box-shadow: 0 0 0 6px rgba(255,138,61,0.18), 0 0 40px rgba(255,138,61,0.7);\n  }\n  .city .nm { font-size: 20px; font-weight: 600; letter-spacing: 0.02em; white-space: nowrap; }\n  .city .cn { font-size: 14px; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; }\n\n  /* Apply bar (cover) */\n  .applybar {\n    display: inline-flex; align-items: center; gap: 14px;\n    border: 1.5px solid var(--fg); border-radius: 999px;\n    padding: 14px 28px; font-size: 22px; font-weight: 500;\n    letter-spacing: 0.02em;\n  }\n  .divider-line { height: 1px; background: var(--line); width: 100%; margin: 36px 0; }\n\n@keyframes pulse-dot { 0%,100% { opacity: 1; transform: scale(1);} 50% { opacity: 0.5; transform: scale(0.85);} }\n\n  /* Slide-specific fixes for chrome/page-num overlaps */\n  section.slide[data-screen-label=\"12 Play 2 champion hypothesis\"] > .slide-chrome,\n  section.slide[data-screen-label=\"13 Play 3 stakeholder journey\"] > .slide-chrome {\n    display: none;\n  }\n  /* Play/Q&A slides: bottom content fills both corners — hide page-num entirely */\n  section.slide[data-screen-label=\"11 Play 1 TAM expansion\"] > .page-num,\n  section.slide[data-screen-label=\"12 Play 2 champion hypothesis\"] > .page-num,\n  section.slide[data-screen-label=\"13 Play 3 stakeholder journey\"] > .page-num,\n  section.slide[data-screen-label=\"14 Your questions\"] > .page-num {\n    display: none;\n  }\n<\u002Fstyle>\n<style id=\"deck-stage-print-page\">@page { size: 1920px 1080px; margin: 0; } @media print { html, body { margin: 0 !important; padding: 0 !important; background: none !important; overflow: visible !important; height: auto !important; } * { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }<\u002Fstyle><\u002Fhead>\n<body data-cc-id=\"cc-1\" style=\"cursor: crosshair; background-color: rgb(255, 255, 255);\">\n\n<deck-stage width=\"1920\" height=\"1080\" data-cc-id=\"cc-3\">\n\n    <!-- 0. Cover / Deckblatt -->\n  <section class=\"slide warm\" data-label=\"Cover\" data-screen-label=\"01 Cover\" data-om-validate=\"no_overflowing_text,no_overlapping_text,slide_sized_text\" data-deck-slide=\"0\" style=\"background: radial-gradient(1400px 900px at 10% 45%, rgba(255, 138, 61, 0.55) 0%, transparent 55%), radial-gradient(1100px 900px at 55% 60%, rgba(182, 66, 140, 0.45) 0%, transparent 60%), radial-gradient(900px 900px at 95% 30%, rgba(43, 26, 74, 0.6) 0%, transparent 65%), rgb(10, 10, 12); padding: 100px 120px;\">\n    <div class=\"diag-lines\" style=\"display: block;\"><\u002Fdiv>\n    <div class=\"slide-chrome\">\n      <img class=\"brand-logo\" src=\"7ef4e018-91b0-45d2-8d0e-4c07b488a57b\" alt=\"Inovexus\">\n      <span class=\"sec\">00 · DECKBLATT<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"flex:1; display:flex; flex-direction:column; justify-content:center; gap: 48px; margin-top: 40px;\">\n      <p class=\"eyebrow\" style=\"margin-bottom: 0;\">Outbound Workshop<\u002Fp>\n      <h1 class=\"display\" style=\"font-size: 200px; line-height: 0.94; letter-spacing: -0.04em; margin:0;\">\n        From founder<br>\n        <span class=\"fg-gradient\" style=\"background: linear-gradient(100deg, rgb(255, 179, 122) 0%, rgb(255, 138, 61) 35%, rgb(182, 66, 140) 85%) text; color: transparent;\">hustle to scale.<\u002Fspan>\n      <\u002Fh1>\n      <p class=\"lede\" style=\"max-width: 1300px;\">\n        The outbound transition from seed to Series A — why the early playbook breaks, and what replaces it.\n      <\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:flex; justify-content:space-between; align-items:flex-end; gap: 60px;\">\n      <div style=\"display:flex; flex-direction:column; gap: 6px;\">\n        <span style=\"font-size: 24px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(245,241,234,0.55); font-weight: 600;\">Session<\u002Fspan>\n        <span style=\"font-size: 32px; font-weight: 600; letter-spacing: -0.01em;\">00 · Opening<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap: 6px;\">\n        <span style=\"font-size: 24px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(245,241,234,0.55); font-weight: 600;\">Duration<\u002Fspan>\n        <span style=\"font-size: 32px; font-weight: 600; letter-spacing: -0.01em;\" data-cc-id=\"cc-2\">60 minutes<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap: 6px;\">\n        <span style=\"font-size: 24px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(245,241,234,0.55); font-weight: 600;\">Audience<\u002Fspan>\n        <span style=\"font-size: 32px; font-weight: 600; letter-spacing: -0.01em;\">Founders · 10 → 100 customers<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 1. Before We Start -->\n  <section class=\"slide\" data-label=\"Before we start\" style=\"padding: 100px 120px;\" data-screen-label=\"02 Before we start\" data-om-validate=\"no_overflowing_text,no_overlapping_text,slide_sized_text\" data-deck-slide=\"1\" data-cc-id=\"cc-5\">\n    <div class=\"diag-lines\" style=\"display: block;\"><\u002Fdiv>\n    <div class=\"slide-chrome\">\n      <img class=\"brand-logo\" src=\"7ef4e018-91b0-45d2-8d0e-4c07b488a57b\" alt=\"Inovexus\">\n      <span class=\"sec\">01 · BEFORE WE START<\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- Header -->\n    <div style=\"display:flex; justify-content:space-between; align-items:flex-start; gap: 40px; margin-top: 24px;\">\n      <div style=\"flex:1;\">\n        <p class=\"eyebrow\" style=\"margin-bottom: 14px;\">Before we start<\u002Fp>\n        <h1 style=\"font-size: 112px; line-height: 0.96; font-weight: 900; letter-spacing: -0.035em; margin: 0;\">\n          Who's running this,<br><span class=\"fg-gradient\" style=\"background: linear-gradient(100deg, rgb(255, 179, 122) 0%, rgb(255, 138, 61) 35%, rgb(182, 66, 140) 85%) text; color: transparent;\">and how we'll spend the hour.<\u002Fspan>\n        <\u002Fh1>\n      <\u002Fdiv>\n      <div style=\"display:inline-flex; align-items:center; gap: 18px; padding: 14px 22px; border: 1px solid var(--line); border-radius: 999px; font-size: 24px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(245,241,234,0.75); font-weight: 500; white-space: nowrap; margin-top: 10px;\">\n        <span style=\"width: 8px; height: 8px; border-radius: 999px; background: #FF8A3D;\"><\u002Fspan>\n        60 min · 7 startups · interactive\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Two columns -->\n    <div style=\"display:grid; grid-template-columns: 1fr 1.15fr; gap: 56px; margin-top: 48px; flex: 1;\">\n\n      <!-- About -->\n      <div style=\"display:flex; flex-direction:column; gap: 18px;\">\n        <div style=\"display:flex; align-items:center; gap: 14px;\">\n          <span style=\"width: 36px; height: 2px; background: #FF8A3D;\"><\u002Fspan>\n          <span style=\"font-size: 24px; letter-spacing: 0.22em; text-transform: uppercase; color: #FF8A3D; font-weight: 700;\">Who's running this<\u002Fspan>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size: 56px; font-weight: 800; letter-spacing: -0.025em; line-height: 1;\">Florian Lapiz<\u002Fdiv>\n          <div style=\"font-size: 26px; color: rgba(245,241,234,0.7); font-weight: 500; margin-top: 8px; letter-spacing: -0.005em;\">GTM Engineer · Marketing &amp; Outbound Specialist<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap: 12px; margin-top: 6px;\">\n          <p style=\"font-size: 22px; line-height: 1.45; color: rgba(245,241,234,0.88); margin: 0;\">\n            <span style=\"color: #FF8A3D; font-weight: 700;\">Focus:<\u002Fspan> helping teams move from founder-led sales to systematic outbound — account selection, signal-based targeting, multi-threaded enterprise plays.\n          <\u002Fp>\n          <p style=\"font-size: 22px; line-height: 1.45; color: rgba(245,241,234,0.75); margin: 0;\">\n            <span style=\"color: rgba(245,241,234,0.9); font-weight: 700;\">Background:<\u002Fspan> 15+ years in B2B marketing, paid acquisition, and funnel building.\n          <\u002Fp>\n          <p style=\"font-size: 20px; line-height: 1.45; color: rgba(245,241,234,0.6); margin: 0; font-style: italic;\">\n            These frameworks are vertical-agnostic. B2B SaaS is where they sharpen fastest — and that’s the lens for today.\n          <\u002Fp>\n        <\u002Fdiv>\n        <div style=\"margin-top: auto; display:flex; gap: 10px; flex-wrap: wrap;\" data-cc-id=\"cc-7\">\n          <span style=\"display: inline-flex; align-items: center; gap: 10px; padding: 8px 16px; border: 1px solid var(--line); border-radius: 999px; font-size: 24px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(245, 241, 234, 0.7); font-weight: 500;\" data-cc-id=\"cc-6\"><br><\u002Fspan>\n          <span style=\"display: inline-flex; align-items: center; gap: 10px; padding: 8px 16px; border: 1px solid var(--line); border-radius: 999px; font-size: 24px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(245, 241, 234, 0.7); font-weight: 500;\" data-cc-id=\"cc-4\"><br><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Agenda -->\n      <div style=\"display:flex; flex-direction:column; gap: 18px;\">\n        <div style=\"display:flex; align-items:center; gap: 14px;\">\n          <span style=\"width: 36px; height: 2px; background: #FF8A3D;\"><\u002Fspan>\n          <span style=\"font-size: 24px; letter-spacing: 0.22em; text-transform: uppercase; color: #FF8A3D; font-weight: 700;\">How we'll spend the hour<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"padding: 28px 32px; border: 1px solid rgba(255,138,61,0.3); border-radius: 18px; background: linear-gradient(160deg, rgba(255,138,61,0.08), rgba(182,66,140,0.04));\">\n          <div style=\"display:grid; grid-template-columns: 120px 1fr; gap: 20px 32px; align-items: baseline;\">\n\n            <div style=\"font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 26px; color: #FF8A3D; font-weight: 700; letter-spacing: 0.02em;\">0–20<\u002Fdiv>\n            <div>\n              <div style=\"font-size: 28px; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 2px;\">Strategy &amp; Stack<\u002Fdiv>\n              <div style=\"font-size: 24px; color: rgba(245,241,234,0.65); line-height: 1.3;\">TAM expansion · pipeline math · tool shifts<\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 26px; color: #FF8A3D; font-weight: 700; letter-spacing: 0.02em; padding-top: 18px; border-top: 1px solid rgba(255,138,61,0.18);\">20–33<\u002Fdiv>\n            <div style=\"padding-top: 18px; border-top: 1px solid rgba(255,138,61,0.18);\">\n              <div style=\"font-size: 28px; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 2px;\">Use Cases &amp; Plays<\u002Fdiv>\n              <div style=\"font-size: 24px; color: rgba(245,241,234,0.65); line-height: 1.3;\">Three concrete plays with email examples<\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 26px; color: #FF8A3D; font-weight: 700; letter-spacing: 0.02em; padding-top: 18px; border-top: 1px solid rgba(255,138,61,0.18);\">33–53<\u002Fdiv>\n            <div style=\"padding-top: 18px; border-top: 1px solid rgba(255,138,61,0.18);\">\n              <div style=\"font-size: 28px; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 2px;\">Your Questions<\u002Fdiv>\n              <div style=\"font-size: 24px; color: rgba(245,241,234,0.65); line-height: 1.3;\">Pre-submitted + open discussion<\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 26px; color: #FF8A3D; font-weight: 700; letter-spacing: 0.02em; padding-top: 18px; border-top: 1px solid rgba(255,138,61,0.18);\">53–60<\u002Fdiv>\n            <div style=\"padding-top: 18px; border-top: 1px solid rgba(255,138,61,0.18);\">\n              <div style=\"font-size: 28px; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 2px;\">Wrap-Up<\u002Fdiv>\n              <div style=\"font-size: 24px; color: rgba(245,241,234,0.65); line-height: 1.3;\">Three rules + 1:1 offer<\u002Fdiv>\n            <\u002Fdiv>\n\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n\n    <!-- Expectation setter -->\n    <div style=\"margin-top: 36px; display:grid; grid-template-columns: 1fr 1fr; gap: 40px; padding-top: 24px; border-top: 1px solid var(--line);\">\n      <div>\n        <div style=\"font-size: 24px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(245,241,234,0.55); font-weight: 600; margin-bottom: 8px;\">What you'll leave with<\u002Fdiv>\n        <div style=\"font-size: 26px; line-height: 1.4; font-weight: 500; color: rgba(245,241,234,0.95);\">\n          A framework. A stack thesis. <span class=\"fg-gradient\" style=\"font-weight: 700; background: linear-gradient(100deg, rgb(255, 179, 122) 0%, rgb(255, 138, 61) 35%, rgb(182, 66, 140) 85%) text; color: transparent;\">Three named plays you can use Monday.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size: 24px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(245,241,234,0.4); font-weight: 600; margin-bottom: 8px;\">What this is not<\u002Fdiv>\n        <div style=\"font-size: 26px; line-height: 1.4; color: rgba(245,241,234,0.55);\">\n          A Clay tutorial. An email-copywriting class. A sales pitch.\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 1. The Seed-to-Series-A Outbound Problem -->\n  <section class=\"slide\" data-label=\"The outbound problem\" style=\"padding: 80px 120px 72px;\" data-screen-label=\"03 The outbound problem\" data-om-validate=\"no_overflowing_text,no_overlapping_text,slide_sized_text\" data-deck-slide=\"2\">\n    <div class=\"diag-lines\" style=\"display: block;\"><\u002Fdiv>\n    <div class=\"slide-chrome\">\n      <img class=\"brand-logo\" src=\"7ef4e018-91b0-45d2-8d0e-4c07b488a57b\" alt=\"Inovexus\">\n      <span class=\"sec\">02 · THE OUTBOUND PROBLEM<\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"display:flex; flex-direction:column; gap: 28px; height:100%;\">\n      <div>\n        <h1 style=\"margin:0; font-size: 58px; line-height: 1.04; font-weight: 900; letter-spacing: -0.025em;\">\n          <span style=\"color: rgba(245,241,234,0.55); font-weight: 700;\">You got your first 10 customers through founder hustle.<\u002Fspan><br>\n          <span style=\"color:#FF8A3D;\">The next 100 won’t come the same way.<\u002Fspan>\n        <\u002Fh1>\n        <p style=\"margin: 14px 0 0 0; font-size: 24px; line-height: 1.35; color: rgba(245,241,234,0.72); max-width: 1400px;\">\n          The motion changes at every stage. This workshop walks the whole path.\n        <\u002Fp>\n      <\u002Fdiv>\n\n      <!-- Stage-journey timeline -->\n      <div style=\"padding: 8px 8%; display:flex; flex-direction:column; gap: 10px;\">\n        <!-- top labels -->\n        <div style=\"display:grid; grid-template-columns: 1fr 1fr 1fr; text-align:center;\">\n          <div style=\"color:#FF8A3D; font-size: 18px; letter-spacing: 0.24em; text-transform: uppercase; font-weight: 800; opacity: 0.72;\">Pre-PMF<\u002Fdiv>\n          <div style=\"color:#FF8A3D; font-size: 18px; letter-spacing: 0.24em; text-transform: uppercase; font-weight: 800; opacity: 0.88;\">Seed<\u002Fdiv>\n          <div style=\"color:#FF8A3D; font-size: 18px; letter-spacing: 0.24em; text-transform: uppercase; font-weight: 800;\">Series A prep<\u002Fdiv>\n        <\u002Fdiv>\n        <!-- line + dots -->\n        <div style=\"position: relative; height: 28px;\">\n          <div style=\"position:absolute; left: 0; right: 0; top: 50%; height: 2px; transform: translateY(-50%); background: linear-gradient(90deg, rgba(255,138,61,0.25) 0%, rgba(255,138,61,0.6) 50%, rgba(255,138,61,1) 100%);\"><\u002Fdiv>\n          <!-- dot 1 -->\n          <div style=\"position:absolute; left: calc(16.67% - 7px); top: 50%; transform: translateY(-50%); width: 14px; height: 14px; border-radius: 50%; background: #FF8A3D; opacity: 0.6;\"><\u002Fdiv>\n          <!-- dot 2 -->\n          <div style=\"position:absolute; left: calc(50% - 9px); top: 50%; transform: translateY(-50%); width: 18px; height: 18px; border-radius: 50%; background: #FF8A3D; opacity: 0.85;\"><\u002Fdiv>\n          <!-- dot 3 -->\n          <div style=\"position:absolute; left: calc(83.33% - 11px); top: 50%; transform: translateY(-50%); width: 22px; height: 22px; border-radius: 50%; background: #FF8A3D; box-shadow: 0 0 16px rgba(255,138,61,0.65), 0 0 32px rgba(255,138,61,0.35);\"><\u002Fdiv>\n        <\u002Fdiv>\n        <!-- bottom sublabels -->\n        <div style=\"display:grid; grid-template-columns: 1fr 1fr 1fr; text-align:center;\">\n          <div style=\"color: rgba(245,241,234,0.72); font-size: 20px; font-style: italic;\">Find the fit<\u002Fdiv>\n          <div style=\"color: rgba(245,241,234,0.82); font-size: 20px; font-style: italic;\">Make it repeatable<\u002Fdiv>\n          <div style=\"color: rgba(245,241,234,0.92); font-size: 20px; font-style: italic; font-weight: 600;\">Expand the TAM<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Comparison table with icons -->\n      <div style=\"display:grid; grid-template-columns: 1.15fr 1.2fr 1.2fr 1.2fr; border: 1px solid var(--line); border-radius: 14px; overflow: hidden; font-size: 22px;\">\n        <div style=\"padding: 12px 20px; background: rgba(255,255,255,0.02);\"><\u002Fdiv>\n        <div style=\"padding: 12px 20px; background: rgba(255,255,255,0.03); color: #FF8A3D; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 800; font-size: 18px;\">Pre-PMF<\u002Fdiv>\n        <div style=\"padding: 12px 20px; background: rgba(255,255,255,0.03); color: #FF8A3D; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 800; font-size: 18px;\">Seed<\u002Fdiv>\n        <div style=\"padding: 12px 20px; background: rgba(255,138,61,0.06); color: #FF8A3D; letter-spacing: 0.18em; text-transform: uppercase; font-weight: 800; font-size: 18px;\">Series A prep<\u002Fdiv>\n\n        <!-- Volume row -->\n        <div style=\"padding: 14px 20px; border-top: 1px solid var(--line); color: rgba(245,241,234,0.6); letter-spacing: 0.14em; text-transform: uppercase; font-weight: 700; font-size: 18px; display:flex; align-items:center; gap: 14px;\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#FF8A3D\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 14l4-4\"><\u002Fpath><path d=\"M3.34 19a10 10 0 1 1 17.32 0\"><\u002Fpath><\u002Fsvg>\n          <span>Volume<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"padding: 14px 20px; border-top: 1px solid var(--line); color: rgba(245,241,234,0.9);\">3–5 design partners<\u002Fdiv>\n        <div style=\"padding: 14px 20px; border-top: 1px solid var(--line); color: rgba(245,241,234,0.9);\">50 emails / week<\u002Fdiv>\n        <div style=\"padding: 14px 20px; border-top: 1px solid var(--line); color: rgba(245,241,234,0.9); background: rgba(255,138,61,0.04);\">Can’t touch every prospect<\u002Fdiv>\n\n        <!-- Motion row -->\n        <div style=\"padding: 14px 20px; border-top: 1px solid var(--line); color: rgba(245,241,234,0.6); letter-spacing: 0.14em; text-transform: uppercase; font-weight: 700; font-
