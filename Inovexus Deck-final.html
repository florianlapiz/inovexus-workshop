d the TAM<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; justify-content:space-between; align-items:flex-end; gap: 60px; margin-top: auto;\">\n        <p style=\"margin:0; font-size: 20px; color: rgba(245,241,234,0.52); font-style: italic; max-width: 760px; line-height: 1.35;\">\n          Pre-PMF and Pre-Seed founders: the frameworks today apply earlier than most think.\n        <\u002Fp>\n        <p style=\"margin:0; font-size: 34px; font-weight: 900; letter-spacing: -0.02em; color: #FF8A3D; line-height: 1.05; text-align: right;\">\n          Tools come second. Strategy first.\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fsection>\n\n  <!-- 3. Persona Matrix + Relevance -->\n  <section class=\"slide\" data-label=\"Persona matrix\" style=\"padding: 100px 120px;\" data-screen-label=\"04 Persona matrix\" data-om-validate=\"no_overflowing_text,no_overlapping_text,slide_sized_text\" data-deck-slide=\"3\">\n    <div class=\"diag-lines\" style=\"display: block;\"><\u002Fdiv>\n    <div class=\"slide-chrome\">\n      <img class=\"brand-logo\" src=\"7ef4e018-91b0-45d2-8d0e-4c07b488a57b\" alt=\"Inovexus\">\n      <span class=\"sec\">03 · PERSONA MATRIX<\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"display:flex; justify-content:space-between; align-items:flex-start; gap: 40px; margin-top: 22px;\">\n      <div style=\"flex:1;\">\n        <p class=\"eyebrow\" style=\"margin-bottom: 10px;\">Persona matrix &amp; relevance<\u002Fp>\n        <h1 style=\"font-size: 68px; line-height: 1.0; font-weight: 900; letter-spacing: -0.03em; margin: 0 0 12px 0;\">\n          At Seed, you sell to one person.<br>\n          <span class=\"fg-gradient\" style=\"background: linear-gradient(100deg, rgb(255, 179, 122) 0%, rgb(255, 138, 61) 35%, rgb(182, 66, 140) 85%) text; color: transparent;\">Upmarket, you navigate five.<\u002Fspan>\n        <\u002Fh1>\n        <p style=\"font-size: 24px; line-height: 1.4; color: rgba(245,241,234,0.72); margin: 0; max-width: 1400px;\">\n          The #1 reason Seed founders stall at Mid-Market isn't the product — it's that they're still selling like there's one buyer in the room.\n        <\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:inline-flex; align-items:center; gap: 14px; padding: 12px 20px; border: 1px solid var(--line); border-radius: 999px; font-size: 24px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(245,241,234,0.75); font-weight: 500; white-space: nowrap; margin-top: 6px;\">\n        <span style=\"width: 8px; height: 8px; border-radius: 999px; background: #FF8A3D;\"><\u002Fspan>\n        Single-contact → multi-threaded\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top: 22px; display:grid; grid-template-columns: 200px 1fr 1fr; gap: 0; border: 1px solid var(--line); border-radius: 12px; overflow: hidden; font-size: 24px;\">\n      <div style=\"padding: 12px 18px; background: rgba(255,255,255,0.02); color: rgba(245,241,234,0.5); letter-spacing: 0.16em; text-transform: uppercase; font-weight: 600;\"><\u002Fdiv>\n      <div style=\"padding: 12px 18px; background: rgba(255,255,255,0.02); color: rgba(245,241,234,0.7); letter-spacing: 0.16em; text-transform: uppercase; font-weight: 700;\">SMB (first 10)<\u002Fdiv>\n      <div style=\"padding: 12px 18px; background: rgba(255,138,61,0.08); color: #FF8A3D; letter-spacing: 0.16em; text-transform: uppercase; font-weight: 700;\">Mid-Market → Enterprise<\u002Fdiv>\n      <div style=\"padding: 10px 18px; color: rgba(245,241,234,0.55); font-weight: 600; \">Contacts per deal<\u002Fdiv>\n      <div style=\"padding: 10px 18px; color: rgba(245,241,234,0.9); \">1<\u002Fdiv>\n      <div style=\"padding: 10px 18px; color: rgba(245,241,234,0.95); background: rgba(255,138,61,0.03); \">3–5<\u002Fdiv>\n      <div style=\"padding: 10px 18px; color: rgba(245,241,234,0.55); font-weight: 600; border-top: 1px solid var(--line);\">Decision speed<\u002Fdiv>\n      <div style=\"padding: 10px 18px; color: rgba(245,241,234,0.9); border-top: 1px solid var(--line);\">Days or weeks<\u002Fdiv>\n      <div style=\"padding: 10px 18px; color: rgba(245,241,234,0.95); background: rgba(255,138,61,0.03); border-top: 1px solid var(--line);\">2–6 months<\u002Fdiv>\n      <div style=\"padding: 10px 18px; color: rgba(245,241,234,0.55); font-weight: 600; border-top: 1px solid var(--line);\">Killers<\u002Fdiv>\n      <div style=\"padding: 10px 18px; color: rgba(245,241,234,0.9); border-top: 1px solid var(--line);\">“No budget”<\u002Fdiv>\n      <div style=\"padding: 10px 18px; color: rgba(245,241,234,0.95); background: rgba(255,138,61,0.03); border-top: 1px solid var(--line);\">Any one stakeholder can veto<\u002Fdiv>\n      <div style=\"padding: 10px 18px; color: rgba(245,241,234,0.55); font-weight: 600; border-top: 1px solid var(--line);\">Your advantage<\u002Fdiv>\n      <div style=\"padding: 10px 18px; color: rgba(245,241,234,0.9); border-top: 1px solid var(--line);\">Speed, founder story<\u002Fdiv>\n      <div style=\"padding: 10px 18px; color: rgba(245,241,234,0.95); background: rgba(255,138,61,0.03); border-top: 1px solid var(--line);\">Trust across the org<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top: 22px;\">\n      <div style=\"display:flex; align-items:center; gap: 14px; margin-bottom: 10px;\">\n        <span style=\"width: 28px; height: 2px; background: #FF8A3D;\"><\u002Fspan>\n        <span style=\"font-size: 24px; letter-spacing: 0.2em; text-transform: uppercase; color: #FF8A3D; font-weight: 700;\">The 5-Persona Matrix<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns: repeat(5, 1fr); gap: 12px;\">\n        <div style=\"padding: 16px 18px; border: 1px solid var(--line); border-radius: 12px; background: rgba(255,255,255,0.02); display:flex; flex-direction:column; gap: 10px;\">\n          <div style=\"display:flex; align-items:baseline; gap: 10px;\">\n            <span style=\"font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 24px; color: rgba(245,241,234,0.45); font-weight: 600;\">01<\u002Fspan>\n            <span style=\"font-size: 26px; font-weight: 800; letter-spacing: -0.015em; color: #FF8A3D;\">Champion<\u002Fspan>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size: 24px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(245,241,234,0.45); font-weight: 600; margin-bottom: 4px;\">Pain<\u002Fdiv>\n            <div style=\"font-size: 24px; line-height: 1.28; color: rgba(245,241,234,0.9);\">Career, looking smart internally<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin-top: auto;\">\n            <div style=\"font-size: 24px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(245,241,234,0.45); font-weight: 600; margin-bottom: 4px;\">Relevant hook<\u002Fdiv>\n            <div style=\"font-size: 24px; line-height: 1.28; color: rgba(245,241,234,0.7); font-style: italic;\">“Your team just posted 3 SDR roles — here’s what worked at [similar company]”<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding: 16px 18px; border: 1px solid var(--line); border-radius: 12px; background: rgba(255,255,255,0.02); display:flex; flex-direction:column; gap: 10px;\">\n          <div style=\"display:flex; align-items:baseline; gap: 10px;\">\n            <span style=\"font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 24px; color: rgba(245,241,234,0.45); font-weight: 600;\">02<\u002Fspan>\n            <span style=\"font-size: 26px; font-weight: 800; letter-spacing: -0.015em; color: #FF8A3D;\">Economic Buyer<\u002Fspan>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size: 24px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(245,241,234,0.45); font-weight: 600; margin-bottom: 4px;\">Pain<\u002Fdiv>\n            <div style=\"font-size: 24px; line-height: 1.28; color: rgba(245,241,234,0.9);\">ROI, budget, CFO-defensibility<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin-top: auto;\">\n            <div style=\"font-size: 24px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(245,241,234,0.45); font-weight: 600; margin-bottom: 4px;\">Relevant hook<\u002Fdiv>\n            <div style=\"font-size: 24px; line-height: 1.28; color: rgba(245,241,234,0.7); font-style: italic;\">“3 open AE roles × 6-month ramp = €240K in lost pipeline”<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding: 16px 18px; border: 1px solid var(--line); border-radius: 12px; background: rgba(255,255,255,0.02); display:flex; flex-direction:column; gap: 10px;\">\n          <div style=\"display:flex; align-items:baseline; gap: 10px;\">\n            <span style=\"font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 24px; color: rgba(245,241,234,0.45); font-weight: 600;\">03<\u002Fspan>\n            <span style=\"font-size: 26px; font-weight: 800; letter-spacing: -0.015em; color: #FF8A3D;\">Technical Buyer<\u002Fspan>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size: 24px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(245,241,234,0.45); font-weight: 600; margin-bottom: 4px;\">Pain<\u002Fdiv>\n            <div style=\"font-size: 24px; line-height: 1.28; color: rgba(245,241,234,0.9);\">Integration, security, stack-fit<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin-top: auto;\">\n            <div style=\"font-size: 24px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(245,241,234,0.45); font-weight: 600; margin-bottom: 4px;\">Relevant hook<\u002Fdiv>\n            <div style=\"font-size: 24px; line-height: 1.28; color: rgba(245,241,234,0.7); font-style: italic;\">“You use HubSpot + Salesforce. Integration takes 2 days, not 2 months.”<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding: 16px 18px; border: 1px solid var(--line); border-radius: 12px; background: rgba(255,255,255,0.02); display:flex; flex-direction:column; gap: 10px;\">\n          <div style=\"display:flex; align-items:baseline; gap: 10px;\">\n            <span style=\"font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 24px; color: rgba(245,241,234,0.45); font-weight: 600;\">04<\u002Fspan>\n            <span style=\"font-size: 26px; font-weight: 800; letter-spacing: -0.015em; color: #FF8A3D;\">End User<\u002Fspan>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size: 24px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(245,241,234,0.45); font-weight: 600; margin-bottom: 4px;\">Pain<\u002Fdiv>\n            <div style=\"font-size: 24px; line-height: 1.28; color: rgba(245,241,234,0.9);\">Day-to-day usability<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin-top: auto;\">\n            <div style=\"font-size: 24px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(245,241,234,0.45); font-weight: 600; margin-bottom: 4px;\">Relevant hook<\u002Fdiv>\n            <div style=\"font-size: 24px; line-height: 1.28; color: rgba(245,241,234,0.7); font-style: italic;\">“Your AEs spend 40% of their day on research. This removes that.”<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding: 16px 18px; border: 1px solid var(--line); border-radius: 12px; background: rgba(255,255,255,0.02); display:flex; flex-direction:column; gap: 10px;\">\n          <div style=\"display:flex; align-items:baseline; gap: 10px;\">\n            <span style=\"font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 24px; color: rgba(245,241,234,0.45); font-weight: 600;\">05<\u002Fspan>\n            <span style=\"font-size: 26px; font-weight: 800; letter-spacing: -0.015em; color: #FF8A3D;\">Blocker<\u002Fspan>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size: 24px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(245,241,234,0.45); font-weight: 600; margin-bottom: 4px;\">Pain<\u002Fdiv>\n            <div style=\"font-size: 24px; line-height: 1.28; color: rgba(245,241,234,0.9);\">Procurement, legal, InfoSec<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin-top: auto;\">\n            <div style=\"font-size: 24px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(245,241,234,0.45); font-weight: 600; margin-bottom: 4px;\">Relevant hook<\u002Fdiv>\n            <div style=\"font-size: 24px; line-height: 1.28; color: rgba(245,241,234,0.7); font-style: italic;\">“3 companies in your vertical deployed this last quarter.”<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top: 22px; display:grid; grid-template-columns: 1fr 1fr; gap: 20px;\">\n      <div style=\"padding: 16px 22px; border: 1px solid var(--line); border-radius: 12px;\">\n        <div style=\"font-size: 24px; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(245,241,234,0.5); font-weight: 700; margin-bottom: 6px;\">Multi-threading<\u002Fdiv>\n        <div style=\"font-size: 24px; line-height: 1.3; color: rgba(245,241,234,0.92);\">Don't wait for the Champion to sell internally. Reach 2–3 personas in parallel, with different messages referencing each other.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"padding: 16px 22px; border: 1px solid var(--line); border-radius: 12px;\">\n        <div style=\"font-size: 24px; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(245,241,234,0.5); font-weight: 700; margin-bottom: 6px;\">Relevance per persona<\u002Fdiv>\n        <div style=\"font-size: 24px; line-height: 1.3; color: rgba(245,241,234,0.92);\">Same account. Same problem. Five framings. If your email could go to 500 companies — or 5 people in one — it isn't relevant enough.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top: 14px; padding: 12px 22px; border-left: 3px solid #FF8A3D; background: rgba(255,138,61,0.06);\">\n      <p style=\"font-size: 26px; line-height: 1.3; font-weight: 600; margin: 0; letter-spacing: -0.005em;\">\n        If you can't fill <span class=\"fg-gradient\" style=\"font-weight: 800; background: linear-gradient(100deg, rgb(255, 179, 122) 0%, rgb(255, 138, 61) 35%, rgb(182, 66, 140) 85%) text; color: transparent;\">3+ personas with specific pain per account<\u002Fspan>, you don't know the account well enough to pitch it yet.\n      <\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 7. Investment focus -->\n  \n\n  <!-- =============================================================\n       WORKSHOP DECK — Outbound for Seed → Series-A B2B SaaS\n       ============================================================= -->\n\n  <!-- 14. Divider — Part 1 of 2: Strategy & Stack -->\n  <section class=\"slide warm\" data-label=\"Part 1 divider\" style=\"padding: 100px 120px; background: radial-gradient(1400px 900px at 10% 45%, rgba(255, 138, 61, 0.55) 0%, transparent 55%), radial-gradient(1100px 900px at 55% 60%, rgba(182, 66, 140, 0.45) 0%, transparent 60%), radial-gradient(900px 900px at 95% 30%, rgba(43, 26, 74, 0.6) 0%, transparent 65%), rgb(10, 10, 12);\" data-screen-label=\"06 Part 1 divider\" data-om-validate=\"no_overflowing_text,no_overlapping_text,slide_sized_text\" data-deck-slide=\"5\">\n    <div class=\"diag-lines\" style=\"display: block;\"><\u002Fdiv>\n    <div class=\"slide-chrome\">\n      <img class=\"brand-logo\" src=\"7ef4e018-91b0-45d2-8d0e-4c07b488a57b\" alt=\"Inovexus\">\n      <span class=\"sec\">04 · PART 1<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"flex:1; display:flex; flex-direction:column; justify-content:center; gap: 40px; max-width: 1500px;\">\n      <div style=\"display:flex; align-items:center; gap: 18px;\">\n        <span style=\"width: 48px; height: 2px; background: #FF8A3D;\"><\u002Fspan>\n        <span style=\"font-size: 26px; letter-spacing: 0.28em; text-transform: uppercase; color: rgba(245,241,234,0.75); font-weight: 700;\">Part 1 of 2<\u002Fspan>\n      <\u002Fdiv>\n      <h1 class=\"display fg-gradient\" style=\"font-size: 200px; line-height: 0.92; background: linear-gradient(100deg, rgb(255, 179, 122) 0%, rgb(255, 138, 61) 35%, rgb(182, 66, 140) 85%) text; color: transparent;\">Strategy<br>&amp; Stack.<\u002Fh1>\n      <p class=\"lede\" style=\"max-width: 1300px; font-size: 46px;\">How to think about TAM expansion — <em style=\"font-style: normal; color: rgba(245,241,234,0.6);\">before<\u002Fem> you touch a tool.<\u002Fp>\n      <div class=\"divider-line\" style=\"margin: 12px 0; max-width: 1300px;\"><\u002Fdiv>\n      <p class=\"small\" style=\"font-size: 28px; max-width: 1200px; line-height: 1.4;\">Four frameworks. One tool thesis. No playbooks yet — those come in Part 2.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 15. The 3 Expansion Vectors -->\n  <section class=\"slide\" data-label=\"Three expansion vectors\" style=\"padding: 80px 120px 72px;\" data-screen-label=\"07 Three expansion vectors\" data-om-validate=\"no_overflowing_text,no_overlapping_text,slide_sized_text\" data-deck-slide=\"6\">\n    <div class=\"diag-lines\" style=\"display: block;\"><\u002Fdiv>\n    <div class=\"slide-chrome\">\n      <img class=\"brand-logo\" src=\"7ef4e018-91b0-45d2-8d0e-4c07b488a57b\" alt=\"Inovexus\">\n      <span class=\"sec\">05 · THREE EXPANSION VECTORS<\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"display:flex; flex-direction:column; gap: 26px; height:100%;\">\n      <div>\n        <h1 style=\"margin:0; font-size: 60px; line-height: 1.04; font-weight: 900; letter-spacing: -0.025em;\">\n          <span style=\"color: rgba(245,241,234,0.55); font-weight: 700;\">You have three directions to grow.<\u002Fspan><br>\n          <span style=\"color:#FF8A3D;\">Most founders only see one.<\u002Fspan>\n        <\u002Fh1>\n        <p style=\"margin: 14px 0 0 0; font-size: 24px; line-height: 1.35; color: rgba(245,241,234,0.72);\">\n          Upmarket isn’t the only move — and often, it’s not even the smart one.\n        <\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"display:grid; grid-template-columns: repeat(3, 1fr); gap: 16px;\">\n        <div style=\"padding: 22px 22px 20px; border: 1px solid var(--line); border-radius: 14px; background: rgba(255,138,61,0.04); display:flex; flex-direction:column; gap: 16px;\">\n          <div style=\"color: #FF8A3D; letter-spacing: 0.22em; text-transform: uppercase; font-weight: 800; font-size: 22px;\">SIZE<\u002Fdiv>\n          <div>\n            <div style=\"color: rgba(245,241,234,0.5); letter-spacing: 0.14em; text-transform: uppercase; font-weight: 700; font-size: 16px; margin-bottom: 4px;\">What<\u002Fdiv>\n            <div style=\"color: rgba(245,241,234,0.95); font-size: 22px; font-weight: 700; line-height: 1.3;\">Same buyer, bigger companies<\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"color: rgba(245,241,234,0.5); letter-spacing: 0.14em; text-transform: uppercase; font-weight: 700; font-size: 16px; margin-bottom: 4px;\">When<\u002Fdiv>\n            <div style=\"color: rgba(245,241,234,0.85); font-size: 20px; line-height: 1.35;\">Product handles enterprise requirements. Economics break without bigger deals.<\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"color: rgba(245,241,234,0.5); letter-spacing: 0.14em; text-transform: uppercase; font-weight: 700; font-size: 16px; margin-bottom: 4px;\">Example<\u002Fdiv>\n            <div style=\"color: rgba(245,241,234,0.9); font-size: 20px; line-height: 1.35; font-style: italic;\">50-seat → 500-seat → 5,000-seat<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding: 22px 22px 20px; border: 1px solid var(--line); border-radius: 14px; background: rgba(255,138,61,0.07); display:flex; flex-direction:column; gap: 16px;\">\n          <div style=\"color: #FF8A3D; letter-spacing: 0.22em; text-transform: uppercase; font-weight: 800; font-size: 22px;\">VERTICAL<\u002Fdiv>\n          <div>\n            <div style=\"color: rgba(245,241,234,0.5); letter-spacing: 0.14em; text-transform: uppercase; font-weight: 700; font-size: 16px; margin-bottom: 4px;\">What<\u002Fdiv>\n            <div style=\"color: rgba(245,241,234,0.95); font-size: 22px; font-weight: 700; line-height: 1.3;\">Same size, different industry<\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"color: rgba(245,241,234,0.5); letter-spacing: 0.14em; text-transform: uppercase; font-weight: 700; font-size: 16px; margin-bottom: 4px;\">When<\u002Fdiv>\n            <div style=\"color: rgba(245,241,234,0.85); font-size: 20px; line-height: 1.35;\">Core use-case transferable. 1–2 proof-points elsewhere.<\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"color: rgba(245,241,234,0.5); letter-spacing: 0.14em; text-transform: uppercase; font-weight: 700; font-size: 16px; margin-bottom: 4px;\">Example<\u002Fdiv>\n            <div style=\"color: rgba(245,241,234,0.9); font-size: 20px; line-height: 1.35; font-style: italic;\">HR-Tech for Startups → Manufacturing<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding: 22px 22px 20px; border: 1px solid var(--line); border-radius: 14px; background: rgba(255,138,61,0.1); display:flex; flex-direction:column; gap: 16px;\">\n          <div style=\"color: #FF8A3D; letter-spacing: 0.22em; text-transform: uppercase; font-weight: 800; font-size: 22px;\">USE-CASE<\u002Fdiv>\n          <div>\n            <div style=\"color: rgba(245,241,234,0.5); letter-spacing: 0.14em; text-transform: uppercase; font-weight: 700; font-size: 16px; margin-bottom: 4px;\">What<\u002Fdiv>\n            <div style=\"color: rgba(245,241,234,0.95); font-size: 22px; font-weight: 700; line-height: 1.3;\">Same buyer, new pain point<\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"color: rgba(245,241,234,0.5); letter-spacing: 0.14em; text-transform: uppercase; font-weight: 700; font-size: 16px; margin-bottom: 4px;\">When<\u002Fdiv>\n            <div style=\"color: rgba(245,241,234,0.85); font-size: 20px; line-height: 1.35;\">Existing accounts have related pain you’re not solving.<\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"color: rgba(245,241,234,0.5); letter-spacing: 0.14em; text-transform: uppercase; font-weight: 700; font-size: 16px; margin-bottom: 4px;\">Example<\u002Fdiv>\n            <div style=\"color: rgba(245,241,234,0.9); font-size: 20px; line-height: 1.35; font-style: italic;\">Onboarding → Performance Reviews<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"padding: 16px 22px; border-left: 3px solid #FF8A3D; background: rgba(255,138,61,0.06); border-radius: 0 10px 10px 0;\">\n        <div style=\"font-size: 22px; line-height: 1.35; color: rgba(245,241,234,0.95);\">\n          <strong style=\"color: #FF8A3D;\">If your product is vertical-specific:<\u002Fstrong> Size is often capped by your vertical’s TAM. Vertical + Use-case become your primary expansion engines.\n        <\u002Fdiv>\n        <div style=\"font-size: 19px; line-height: 1.35; color: rgba(245,241,234,0.6); margin-top: 4px; font-style: italic;\">\n          Example flow: Water savings → Energy monitoring → Waste tracking (same hotel buyer, three connected pains).\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"margin-top: auto; text-align: center;\">\n        <p style=\"margin: 0; font-size: 40px; font-weight: 900; letter-spacing: -0.02em; color: #FF8A3D; line-height: 1.08;\">\n          Don’t pick one. Test two vectors in parallel.<br>\n          <span style=\"color: rgba(245,241,234,0.85); font-weight: 700;\">Kill the weaker after 60 days.<\u002Fspan>\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fsection>\n\n  <!-- 16. Signal-Based Account Selection -->\n  <section class=\"slide\" data-label=\"Signal-based account selection\" style=\"padding: 100px 120px;\" data-screen-label=\"08 Signal-based account selection\" data-om-validate=\"no_overflowing_text,no_overlapping_text,slide_sized_text\" data-deck-slide=\"7\">\n    <div class=\"diag-lines\" style=\"display: block;\"><\u002Fdiv>\n    <div class=\"slide-chrome\">\n      <img class=\"brand-logo\" src=\"7ef4e018-91b0-45d2-8d0e-4c07b488a57b\" alt=\"Inovexus\">\n      <span class=\"sec\">06 · TAM EXPANSION — WHO TO TARGET<\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"margin-top: 22px;\">\n      <p class=\"eyebrow\" style=\"margin-bottom: 10px;\">Part 2 of 3 · Signal-based account selection<\u002Fp>\n      <h1 style=\"font-size: 68px; line-height: 1.0; font-weight: 900; letter-spacing: -0.03em; margin: 0 0 10px 0;\">\n        Firmographics tell you <span style=\"color: rgba(245,241,234,0.5);\">who<\u002Fspan>.<br>\n        Signals tell you <span class=\"fg-gradient\" style=\"background: linear-gradient(100deg, rgb(255, 179, 122) 0%, rgb(255, 138, 61) 35%, rgb(182, 66, 140) 85%) text; color: transparent;\">when<\u002Fspan>.\n      <\u002Fh1>\n      <p style=\"font-size: 24px; line-height: 1.4; color: rgba(245,241,234,0.72); margin: 0; max-width: 1400px;\">\n        At Mid-Market and Enterprise, timing is half the game. The other half is knowing what to look for.\n      <\u002Fp>\n    <\u002Fdiv>\n\n    <!-- 4 Signal categories + Scorecard side-by-side -->\n    <div style=\"margin-top: 20px; display:grid; grid-template-columns: 1.25fr 1fr; gap: 22px;\">\n      <!-- LEFT: 4 categories table -->\n      <div>\n        <div style=\"display:flex; align-items:center; gap: 14px; margin-bottom: 8px;\">\n          <span style=\"width: 28px; height: 2px; background: #FF8A3D;\"><\u002Fspan>\n          <span style=\"font-size: 22px; letter-spacing: 0.2em; text-transform: uppercase; color: #FF8A3D; font-weight: 700;\">The 4 signal categories<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns: 180px 1fr 1.2fr; border: 1px solid var(--line); border-radius: 10px; overflow: hidden; font-size: 21px;\">\n          <div style=\"padding: 8px 14px; background: rgba(255,255,255,0.02); color: rgba(245,241,234,0.5); letter-spacing: 0.14em; text-transform: uppercase; font-weight: 700;\">Category<\u002Fdiv>\n          <div style=\"padding: 8px 14px; background: rgba(255,255,255,0.02); color: rgba(245,241,234,0.5); letter-spacing: 0.14em; text-transform: uppercase; font-weight: 700;\">Tells you<\u002Fdiv>\n          <div style=\"padding: 8px 14px; background: rgba(255,255,255,0.02); color: rgba(245,241,234,0.5); letter-spacing: 0.14em; text-transform: uppercase; font-weight: 700;\">Where to find<\u002Fdiv>\n\n          <div style=\"padding: 10px 14px; color: #FF8A3D; font-weight: 700; border-top: 1px solid var(--line);\">Growth<\u002Fdiv>\n          <div style=\"padding: 10px 14px; color: rgba(245,241,234,0.9); border-top: 1px solid var(--line);\">Budget + pressure to scale<\u002Fdiv>\n          <div style=\"padding: 10px 14px; color: rgba(245,241,234,0.75); border-top: 1px solid var(--line);\">Crunchbase · LinkedIn headcount · funding PR<\u002Fdiv>\n\n          <div style=\"padding: 10px 14px; color: #FF8A3D; font-weight: 700; border-top: 1px solid var(--line);\">Buying<\u002Fdiv>\n          <div style=\"padding: 10px 14px; color: rgba(245,241,234,0.9); border-top: 1px solid var(--line);\">A department is being built — budget follows<\u002Fdiv>\n          <div style=\"padding: 10px 14px; color: rgba(245,241,234,0.75); border-top: 1px solid var(--line);\">Job boards · VP announcements · org-chart moves<\u002Fdiv>\n\n          <div style=\"padding: 10px 14px; color: #FF8A3D; font-weight: 700; border-top: 1px solid var(--line);\">Pain<\u002Fdiv>\n          <div style=\"padding: 10px 14px; color: rgba(245,241,234,0.9); border-top: 1px solid var(--line);\">Active problem, already spending money<\u002Fdiv>\n          <div style=\"padding: 10px 14px; color: rgba(245,241,234,0.75); border-top: 1px solid var(--line);\">G2 / Capterra · Glassdoor · BuiltWith deltas<\u002Fdiv>\n\n          <div style=\"padding: 10px 14px; color: #FF8A3D; font-weight: 700; border-top: 1px solid var(--line);\">Timing<\u002Fdiv>\n          <div style=\"padding: 10px 14px; color: rgba(245,241,234,0.9); border-top: 1px solid var(--line);\">Decision windows are open<\u002Fdiv>\n          <div style=\"padding: 10px 14px; color: rgba(245,241,234,0.75); border-top: 1px solid var(--line);\">FY boundaries · leadership changes · M&amp;A<\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- 3-signal rule -->\n        <div style=\"margin-top: 14px; padding: 14px 20px; border-left: 3px solid #FF8A3D; background: rgba(255,138,61,0.06);\">\n          <div style=\"font-size: 22px; letter-spacing: 0.16em; text-transform: uppercase; color: #FF8A3D; font-weight: 700; margin-bottom: 4px;\">The 3-signal rule<\u002Fdiv>\n          <div style=\"font-size: 24px; line-height: 1.32; font-weight: 600;\">If you don't have 3+ signals on an account, don't touch it.<\u002Fdiv>\n          <div style=\"font-size: 20px; line-height: 1.4; color: rgba(245,241,234,0.7); margin-top: 4px;\">At Enterprise, one account = 2–4 weeks of work. Wrong pick = 1 lost month. Right pick = 3× hit rate.<\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Common mistakes -->\n        <div style=\"margin-top: 12px; display:grid; grid-template-columns: 1fr 1fr; gap: 8px 22px; font-size: 20px; color: rgba(245,241,234,0.65); line-height: 1.35;\">\n          <div style=\"font-size: 20px; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(245,241,234,0.45); font-weight: 700; grid-column: 1 / -1; margin-bottom: 2px;\">Common mistakes<\u002Fdiv>\n          <div>× Firmographics-only (10K accounts, too generic)<\u002Fdiv>\n          <div>× Single-signal chase (everyone pitches the same Series A)<\u002Fdiv>\n          <div>× Outdated signals (6-month-old job post = role filled)<\u002Fdiv>\n          <div>× No scoring system (every account feels \"promising\")<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- RIGHT: Scorecard code block -->\n      <div>\n        <div style=\"display:flex; align-items:center; gap: 14px; margin-bottom: 8px;\">\n          <span style=\"width: 28px; height: 2px; background: #FF8A3D;\"><\u002Fspan>\n          <span style=\"font-size: 22px; letter-spacing: 0.2em; text-transform: uppercase; color: #FF8A3D; font-weight: 700;\">Account scorecard — HR-Tech expansion<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"padding: 20px 24px; border: 1px solid var(--line); border-radius: 12px; background: #0E0E12; font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 20px; line-height: 1.55; color: rgba(245,241,234,0.88);\">\n          <div style=\"color: rgba(245,241,234,0.45); margin-bottom: 6px;\"># TARGET: ACME Corp (500 employees)<\u002Fdiv>\n          <div><span style=\"color: #8FE28B;\">✓<\u002Fspan> <span style=\"color:#FF8A3D;\">Growth<\u002Fspan> &nbsp;&nbsp;Series B announced 6w ago (+60 headcount / 3mo)<\u002Fdiv>\n          <div><span style=\"color: #8FE28B;\">✓<\u002Fspan> <span style=\"color:#FF8A3D;\">Buying<\u002Fspan> &nbsp;&nbsp;Hiring VP People + 2 HR Generalists<\u002Fdiv>\n          <div><span style=\"color: #8FE28B;\">✓<\u002Fspan> <span style=\"color:#FF8A3D;\">Pain<\u002Fspan> &nbsp;&nbsp;&nbsp;&nbsp;3 Glassdoor reviews: \"onboarding is chaos\"<\u002Fdiv>\n          <div><span style=\"color: #8FE28B;\">✓<\u002Fspan> <span style=\"color:#FF8A3D;\">Timing<\u002Fspan> &nbsp;&nbsp;New CFO starts in January<\u002Fdiv>\n          <div><span style=\"color: #E07373;\">✗<\u002Fspan> <span style=\"color:#FF8A3D;\">Tech<\u002Fspan> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;No public stack signal<\u002Fdiv>\n          <div style=\"margin-top: 10px; padding-top: 10px; border-top: 1px dashed rgba(245,241,234,0.15);\"><span style=\"color: rgba(245,241,234,0.55);\"># Signal count:<\u002Fspan> <span style=\"color: #8FE28B; font-weight: 700;\">4/5 — GO<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Signal sources -->\n        <div style=\"margin-top: 14px; display:grid; grid-template-columns: 1.15fr 1fr 1fr; border: 1px solid var(--line); border-radius: 10px; overflow: hidden; font-size: 19px;\">\n          <div style=\"padding: 8px 12px; background: rgba(255,255,255,0.02); color: rgba(245,241,234,0.5); letter-spacing: 0.14em; text-transform: uppercase; font-weight: 700;\">Signal<\u002Fdiv>\n          <div style=\"padding: 8px 12px; background: rgba(255,255,255,0.02); color: rgba(245,241,234,0.5); letter-spacing: 0.14em; text-transform: uppercase; font-weight: 700;\">Free / low-cost<\u002Fdiv>\n          <div style=\"padding: 8px 12px; background: rgba(255,138,61,0.08); color: #FF8A3D; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 700;\">Paid<\u002Fdiv>\n\n          <div style=\"padding: 8px 12px; color: rgba(245,241,234,0.85); border-top: 1px solid var(--line);\">Funding, hiring<\u002Fdiv>\n          <div style=\"padding: 8px 12px; color: rgba(245,241,234,0.75); border-top: 1px solid var(--line);\">Sales Nav, Crunchbase free, Google Alerts<\u002Fdiv>\n          <div style=\"padding: 8px 12px; color: rgba(245,241,234,0.9); border-top: 1px solid var(--line); background: rgba(255,138,61,0.03);\">Clay · Apollo · Cognism<\u002Fdiv>\n\n          <div style=\"padding: 8px 12px; color: rgba(245,241,234,0.85); border-top: 1px solid var(--line);\">Tech stack<\u002Fdiv>\n          <div style=\"padding: 8px 12px; color: rgba(245,241,234,0.75); border-top: 1px solid var(--line);\">BuiltWith free · Wappalyzer<\u002Fdiv>\n          <div style=\"padding: 8px 12px; color: rgba(245,241,234,0.9); border-top: 1px solid var(--line); background: rgba(255,138,61,0.03);\">BuiltWith Pro · HG Insights<\u002Fdiv>\n\n          <div style=\"padding: 8px 12px; color: rgba(245,241,234,0.85); border-top: 1px solid var(--line);\">Reviews / complaints<\u002Fdiv>\n          <div style=\"padding: 8px 12px; color: rgba(245,241,234,0.75); border-top: 1px solid var(--line);\">G2 · Capterra · Glassdoor · Reddit<\u002Fdiv>\n          <div style=\"padding: 8px 12px; color: rgba(245,241,234,0.9); border-top: 1px solid var(--line); background: rgba(255,138,61,0.03);\">Proxycurl · Clay enrichment<\u002Fdiv>\n\n          <div style=\"padding: 8px 12px; color: rgba(245,241,234,0.85); border-top: 1px solid var(--line);\">Leadership change<\u002Fdiv>\n          <div style=\"padding: 8px 12px; color: rgba(245,241,234,0.75); border-top: 1px solid var(--line);\">LinkedIn · The Org<\u002Fdiv>\n          <div style=\"padding: 8px 12px; color: rgba(245,241,234,0.9); border-top: 1px solid var(--line); background: rgba(255,138,61,0.03);\">People Data Labs<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 17. Pipeline Math & Cadence -->\n  <section class=\"slide\" data-label=\"Pipeline math and cadence\" style=\"padding: 100px 120px;\" data-screen-label=\"09 Pipeline math and cadence\" data-om-validate=\"no_overflowing_text,no_overlapping_text,slide_sized_text\" data-deck-slide=\"8\">\n    <div class=\"diag-lines\" style=\"display: block;\"><\u002Fdiv>\n    <div class=\"slide-chrome\">\n      <img class=\"brand-logo\" src=\"7ef4e018-91b0-45d2-8d0e-4c07b488a57b\" alt=\"Inovexus\">\n      <span class=\"sec\">07 · TAM EXPANSION — HOW TO RUN IT<\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"margin-top: 22px;\">\n      <p class=\"eyebrow\" style=\"margin-bottom: 10px;\">Part 3 of 3 · Pipeline math &amp; cadence<\u002Fp>\n      <h1 style=\"font-size: 60px; line-height: 1.02; font-weight: 900; letter-spacing: -0.03em; margin: 0 0 10px 0;\">\n        Enterprise deals don't die at the pitch.<br>\n        <span class=\"fg-gradient\" style=\"background: linear-gradient(100deg, rgb(255, 179, 122) 0%, rgb(255, 138, 61) 35%, rgb(182, 66, 140) 85%) text; color: transparent;\">They die in the gap between month 2 and month 4.<\u002Fspan>\n      <\u002Fh1>\n      <p style=\"font-size: 22px; line-height: 1.4; color: rgba(245,241,234,0.72); margin: 0; max-width: 1400px;\">\n        The math says less volume. The calendar says longer cycles. Most founders do neither.\n      <\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"margin-top: 18px; display:grid; grid-template-columns: 1fr 1fr; gap: 22px;\">\n      <!-- LEFT: Pipeline math table -->\n      <div>\n        <div style=\"display:flex; align-items:center; gap: 14px; margin-bottom: 8px;\">\n          <span style=\"width: 28px; height: 2px; background: #FF8A3D;\"><\u002Fspan>\n          <span style=\"font-size: 20px; letter-spacing: 0.2em; text-transform: uppercase; color: #FF8A3D; font-weight: 700;\">Pipeline math reality<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns: 1.2fr 1fr 1fr 1fr 1fr 1fr; border: 1px solid var(--line); border-radius: 10px; overflow: hidden; font-size: 18px;\">\n          <div style=\"padding: 8px 10px; background: rgba(255,255,255,0.02); color: rgba(245,241,234,0.5); letter-spacing: 0.12em; text-transform: uppercase; font-weight: 700;\">Stage<\u002Fdiv>\n          <div style=\"padding: 8px 10px; background: rgba(255,255,255,0.02); color: rgba(245,241,234,0.5); letter-spacing: 0.12em; text-transform: uppercase; font-weight: 700; text-align:right;\">Accts/mo<\u002Fdiv>\n          <div style=\"padding: 8px 10px; background: rgba(255,255,255,0.02); color: rgba(245,241,234,0.5); letter-spacing: 0.12em; text-transform: uppercase; font-weight: 700; text-align:right;\">Reply<\u002Fdiv>\n          <div style=\"padding: 8px 10px; background: rgba(255,255,255,0.02); color: rgba(245,241,234,0.5); letter-spacing: 0.12em; text-transform: uppercase; font-weight: 700; text-align:right;\">Meetings<\u002Fdiv>\n          <div style=\"padding: 8px 10px; background: rgba(255,255,255,0.02); color: rgba(245,241,234,0.5); letter-spacing: 0.12em; text-transform: uppercase; font-weight: 700; text-align:right;\">Win<\u002Fdiv>\n          <div style=\"padding: 8px 10px; background: rgba(255,138,61,0.08); color: #FF8A3D; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 700; text-align:right;\">ARR/mo<\u002Fdiv>\n\n          <div style=\"padding: 10px; color: rgba(245,241,234,0.9); border-top: 1px solid var(--line); font-weight: 700;\">SMB<\u002Fdiv>\n          <div style=\"padding: 10px; text-align:right; color: rgba(245,241,234,0.85); border-top: 1px solid var(--line);\">1,000<\u002Fdiv>\n          <div style=\"padding: 10px; text-align:right; color: rgba(245,241,234,0.85); border-top: 1px solid var(--line);\">2%<\u002Fdiv>\n          <div style=\"padding: 10px; text-align:right; color: rgba(245,241,234,0.85); border-top: 1px solid var(--line);\">20<\u002Fdiv>\n          <div style=\"padding: 10px; text-align:right; color: rgba(245,241,234,0.85); border-top: 1px solid var(--line);\">10%<\u002Fdiv>\n          <div style=\"padding: 10px; text-align:right; color: #FF8A3D; font-weight: 700; border-top: 1px solid var(--line); background: rgba(255,138,61,0.04);\">€10K<\u002Fdiv>\n\n          <div style=\"padding: 10px; color: rgba(245,241,234,0.9); border-top: 1px solid var(--line); font-weight: 700;\">Mid-Market<\u002Fdiv>\n          <div style=\"padding: 10px; text-align:right; color: rgba(245,241,234,0.85); border-top: 1px solid var(--line);\">200<\u002Fdiv>\n          <div style=\"padding: 10px; text-align:right; color: rgba(245,241,234,0.85); border-top: 1px solid var(--line);\">5%<\u002Fdiv>\n          <div style=\"padding: 10px; text-align:right; color: rgba(245,241,234,0.85); border-top: 1px solid var(--line);\">10<\u002Fdiv>\n          <div style=\"padding: 10px; text-align:right; color: rgba(245,241,234,0.85); border-top: 1px solid var(--line);\">15%<\u002Fdiv>\n          <div style=\"padding: 10px; text-align:right; color: #FF8A3D; font-weight: 700; border-top: 1px solid var(--line); background: rgba(255,138,61,0.04);\">€37K<\u002Fdiv>\n\n          <div style=\"padding: 10px; color: rgba(245,241,234,0.95); border-top: 1px solid var(--line); font-weight: 700;\">Enterprise<\u002Fdiv>\n          <div style=\"padding: 10px; text-align:right; color: rgba(245,241,234,0.9); border-top: 1px solid var(--line);\">50<\u002Fdiv>\n          <div style=\"padding: 10px; text-align:right; color: rgba(245,241,234,0.9); border-top: 1px solid var(--line);\">10%<\u002Fdiv>\n          <div style=\"padding: 10px; text-align:right; color: rgba(245,241,234,0.9); border-top: 1px solid var(--line);\">5<\u002Fdiv>\n          <div style=\"padding: 10px; text-align:right; color: rgba(245,241,234,0.9); border-top: 1px solid var(--line);\">25%<\u002Fdiv>\n          <div style=\"padding: 10px; text-align:right; color: #FF8A3D; font-weight: 800; border-top: 1px solid var(--line); background: rgba(255,138,61,0.08);\">€187K<\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-size: 20px; line-height: 1.4; color: rgba(245,241,234,0.75); margin: 10px 0 0 0;\">Don't 10× volume to go upmarket. <strong>Reduce volume by 95% and go deeper per account.<\u002Fstrong><\u002Fp>\n\n        <!-- Pull quote -->\n        <div style=\"margin-top: 14px; padding: 14px 20px; border-left: 3px solid #FF8A3D; background: rgba(255,138,61,0.06);\">\n          <div style=\"font-size: 20px; letter-spacing: 0.16em; text-transform: uppercase; color: #FF8A3D; font-weight: 700; margin-bottom: 4px;\">The principle<\u002Fdiv>\n          <div style=\"font-size: 26px; line-height: 1.28; font-weight: 700;\">Build assets, not emails.<\u002Fdiv>\n          <div style=\"font-size: 19px; line-height: 1.4; color: rgba(245,241,234,0.72); margin-top: 4px;\">At SMB you write emails. At Enterprise you build a library — ROI calculator, 1-page case study, benchmark, security doc, 5-min demo, comparison matrix — and deploy across 50 accounts.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- RIGHT: 6-month cadence playbook -->\n      <div>\n        <div style=\"display:flex; align-items:center; gap: 14px; margin-bottom: 8px;\">\n          <span style=\"width: 28px; height: 2px; background: #FF8A3D;\"><\u002Fspan>\n          <span style=\"font-size: 20px; letter-spacing: 0.2em; text-transform: uppercase; color: #FF8A3D; font-weight: 700;\">6-month cadence playbook<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns: 60px 1.1fr 1.4fr; border: 1px solid var(--line); border-radius: 10px; overflow: hidden; font-size: 18px;\">\n          <div style=\"padding: 8px 10px; background: rgba(255,255,255,0.02); color: rgba(245,241,234,0.5); letter-spacing: 0.12em; text-transform: uppercase; font-weight: 700;\">Mo<\u002Fdiv>\n          <div style=\"padding: 8px 10px; background: rgba(255,255,255,0.02); color: rgba(245,241,234,0.5); letter-spacing: 0.12em; text-transform: uppercase; font-weight: 700;\">Your move<\u002Fdiv>\n          <div style=\"padding: 8px 10px; background: rgba(255,255,255,0.02); color: rgba(245,241,234,0.5); letter-spacing: 0.12em; text-transform: uppercase; font-weight: 700;\">What to send<\u002Fdiv>\n\n          <div style=\"padding: 10px; color: #FF8A3D; font-weight: 800; border-top: 1px solid var(--line);\">1<\u002Fdiv>\n          <div style=\"padding: 10px; color: rgba(245,241,234,0.9); border-top: 1px solid var(--line);\">Initial engagement<\u002Fdiv>\n          <div style=\"padding: 10px; color: rgba(245,241,234,0.72); border-top: 1px solid var(--line);\">3–4 multi-threaded touches, email + LinkedIn. Find the Champion.<\u002Fdiv>\n\n          <div style=\"padding: 10px; color: #FF8A3D; font-weight: 800; border-top: 1px solid var(--line);\">2<\u002Fdiv>\n          <div style=\"padding: 10px; color: rgba(245,241,234,0.9); border-top: 1px solid var(--line);\">Champion support<\u002Fdiv>\n          <div style=\"padding: 10px; color: rgba(245,241,234,0.72); border-top: 1px solid var(--line);\">Business case template, ROI calc. Equip Champion to sell internally.<\u002Fdiv>\n\n          <div style=\"padding: 10px; color: #FF8A3D; font-weight: 800; border-top: 1px solid var(--line);\">3<\u002Fdiv>\n          <div style=\"padding: 10px; color: rgba(245,241,234,0.9); border-top: 1px solid var(--line);\">Re-engagement<\u002Fdiv>\n          <div style=\"padding: 10px; color: rgba(245,241,234,0.72); border-top: 1px solid var(--line);\">Case study · benchmark · industry news. Bring value, not pitch.<\u002Fdiv>\n\n          <div style=\"padding: 10px; color: #FF8A3D; font-weight: 800; border-top: 1px solid var(--line);\">4<\u002Fdiv>\n          <div style=\"padding: 10px; color: rgba(245,241,234,0.9); border-top: 1px solid var(--line);\">Stakeholder expansion<\u002Fdiv>\n          <div style=\"padding: 10px; color: rgba(245,241,234,0.72); border-top: 1px solid var(--line);\">Tailored asset per remaining persona. Address blockers pre-emptively.<\u002Fdiv>\n\n          <div style=\"padding: 10px; color: #FF8A3D; font-weight: 800; border-top: 1px solid var(--line);\">5<\u002Fdiv>\n          <div style=\"padding: 10px; color: rgba(245,241,234,0.9); border-top: 1px solid var(--line);\">Commercial nudge<\u002Fdiv>\n          <div style=\"padding: 10px; color: rgba(245,241,234,0.72); border-top: 1px solid var(--line);\">Deadline signal: Q4 pricing, exclusive pilot. Momentum, not pressure.<\u002Fdiv>\n\n          <div style=\"padding: 10px; color: #FF8A3D; font-weight: 800; border-top: 1px solid var(--line); background: rgba(255,138,61,0.04);\">6<\u002Fdiv>\n          <div style=\"padding: 10px; color: rgba(245,241,234,0.95); border-top: 1px solid var(--line); background: rgba(255,138,61,0.04); font-weight: 600;\">Close or cadence-down<\u002Fdiv>\n          <div style=\"padding: 10px; color: rgba(245,241,234,0.8); border-top: 1px solid var(--line); background: rgba(255,138,61,0.04);\">Contract — or quarterly nurture. Win, or keep the door open.<\u002Fdiv>\n        <\u002Fdiv>\n\n        <p style=\"font-size: 20px; line-height: 1.4; color: rgba(245,241,234,0.65); margin: 12px 0 0 0;\"><strong style=\"color: rgba(245,241,234,0.85);\">Why deals die:<\u002Fstrong> founders pitch in Month 1, follow up twice, go silent. Deal is still alive — they just stopped showing up.<\u002Fp>\n\n        <div style=\"margin-top: 10px; font-size: 18px; color: rgba(245,241,234,0.6); line-height: 1.4;\">\n          <span style=\"font-size: 18px; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(245,241,234,0.45); font-weight: 700; display:block; margin-bottom: 4px;\">Cadence mistakes<\u002Fspan>\n          × Going silent after month 1 · × Pitching every touch · × Ignoring downshift past month 6 · × No internal tracking\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 18. Stack Compression (Tool-agnostic) -->\n  <section class=\"slide\" data-label=\"Stack compression\" style=\"padding: 80px 120px 72px;\" data-screen-label=\"10 Stack compression\" data-om-validate=\"no_overflowing_text,no_overlapping_text,slide_sized_text\" data-deck-slide=\"9\">\n    <div class=\"diag-lines\" style=\"display: block;\"><\u002Fdiv>\n    <div class=\"slide-chrome\">\n      <img class=\"brand-logo\" src=\"7ef4e018-91b0-45d2-8d0e-4c07b488a57b\" alt=\"Inovexus\">\n      <span class=\"sec\">08 · STACK COMPRESSION<\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"display:flex; flex-direction:column; gap: 16px; height:100%;\">\n      <div>\n        <h1 style=\"margin:0; font-size: 52px; line-height: 1.04; font-weight: 900; letter-spacing: -0.025em;\">\n          <span style=\"color: rgba(245,241,234,0.55); font-weight: 700;\">The question isn’t which tool.<\u002Fspan><br>\n          <span style=\"color:#FF8A3D;\">It’s which part of your stack is being eaten by AI primitives.<\u002Fspan>\n        <\u002Fh1>\n        <p style=\"margin: 12px 0 0 0; font-size: 22px; line-height: 1.35; color: rgba(245,241,234,0.72);\">\n          Two shifts happening right now that most founders haven’t priced in yet.\n        <\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"display:grid; grid-template-columns: -spacing: 0.22em; text-transform: uppercase; font-weight: 800; font-size: 18px; margin-bottom: 10px;\">The Meta-Twist<\u002Fdiv>\n        <div style=\"font-size: 32px; font-weight: 900; line-height: 1.1; letter-spacing: -0.02em; color: rgba(245,241,234,0.98); margin-bottom: 14px;\">\n          You’re building agentic AI.<br>\n          <span style=\"color: #FF8A3D;\">Your outbound motion should be agentic too.<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 10px;\">\n          <div style=\"display:flex; align-items:center; gap: 10px; font-size: 19px; color: rgba(245,241,234,0.9);\">\n            <span style=\"width: 6px; height: 6px; border-radius: 50%; background: #FF8A3D; flex-shrink: 0;\"><\u002Fspan>\n            Research agents running 24/7\n          <\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap: 10px; font-size: 19px; color: rgba(245,241,234,0.9);\">\n            <span style=\"width: 6px; height: 6px; border-radius: 50%; background: #FF8A3D; flex-shrink: 0;\"><\u002Fspan>\n            Self-updating enrichment pipelines\n          <\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap: 10px; font-size: 19px; color: rgba(245,241,234,0.9);\">\n            <span style=\"width: 6px; height: 6px; border-radius: 50%; background: #FF8A3D; flex-shrink: 0;\"><\u002Fspan>\n            AI-generated qualification pre-pipeline\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size: 18px; color: rgba(245,241,234,0.72); line-height: 1.35; font-style: italic; border-top: 1px solid rgba(255,138,61,0.25); padding-top: 10px;\">\n          Claude Code + Exa.ai + your prompts = a research agent that does in <strong style=\"color: #FF8A3D; font-style: normal;\">10 minutes<\u002Fstrong> what an SDR does in 2 hours.\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- IN PRACTICE block -->\n      <div style=\"padding: 16px 24px; bo se rate: <span style=\"font-variant-numeric: tabular-nums; font-weight:700;\">15–25%<\u002Fspan> on engaged accounts<\u002Fspan><\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n\n      <!-- Bottom row: Readiness check + Monday -->\n      <div style=\"display:grid; grid-template-columns: 1.35fr 0.65fr; gap: 20px; align-items:stretch; flex: 1; min-height: 0;\">\n\n        <!-- Enterprise Readiness -->\n        <div style=\"padding: 22px 26px; border-radius: 14px; border: 1px solid var(--line); background: rgba(255,255,255,0.025); display:flex; flex-direction:column; gap: 14px;\">\n          <div style=\"display:flex; align-items:baseline; gap: 14px;\">\n            <div style=\"color: rgba(245,241,234,0.5); letter-spacing: 0.22em; text-transform: uppercase; font-weight: 700; font-size: 13px;\">Enterprise-readiness check<\u002Fdiv>\n            <div style=\"color: rgba(245,241,234,0.4); font-size: 13px; letter-spacing: 0.06em;\">must-have before Phase 1<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px;\">\n            <div style=\"display:flex; gap: 12px; align-items:flex-start;\">\n              <div style=\"width: 22px; height: 22px; border: 1.5px solid rgba(245,241,234,0.55); border-radius: 5px; flex-shrink: 0; margin-top: 3px;\"><\u002Fdiv>\n              <div>\n                <div style=\"font-size: 17px; font-weight: 700; line-height: 1.25;\">SOC 2 Type I<\u002Fdiv>\n                <div style=\"font-size: 14px; color: rgba(245,241,234,0.58); line-height: 1.35; margin-top: 3px;\">with Type II roadmap<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"display:flex; gap: 12px; align-items:flex-start;\">\n              <div style=\"width: 22px; height: 22px; border: 1.5px solid rgba(245,241,234,0.55); border-radius: 5px; flex-shrink: 0; margin-top: 3px;\"><\u002Fdiv>\n              <div>\n                <div style=\"font-size: 1 iv style=\"margin-top: 2px; font-size: 13px; color: rgba(245,241,234,0.6); line-height: 1.35;\">+ marketing + CS<\u002Fdiv>\n              <div style=\"margin-top: 10px; font-size: 12px; color: rgba(245,241,234,0.4); letter-spacing: 0.06em;\">—<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Bottom: Top 3 mistakes + Monday -->\n      <div style=\"display:grid; grid-template-columns: 1.35fr 0.65fr; gap: 20px; align-items:stretch; flex: 1; min-height: 0;\">\n\n        <!-- MISTAKES -->\n        <div style=\"display:flex; flex-direction:column; gap: 10px;\">\n          <div style=\"color: rgba(245,241,234,0.5); letter-spacing: 0.22em; text-transform: uppercase; font-weight: 700; font-size: 13px;\">Top 3 hiring mistakes<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap: 9px;\">\n            <div style=\"display:flex; gap: 16px; padding: 13px 18px; border: 1px solid rgba(245,241,234,0.1); border-radius: 10px; background: rgba(255,255,255,0.02);\">\n              <div style=\"color:#FF8A3D; font-size: 22px; font-weight: 900; line-height: 1; font-variant-numeric: tabular-nums; min-width: 28px;\">01<\u002Fdiv>\n              <div style=\"font-size: 15px; line-height: 1.38;\"><span style=\"font-weight: 800;\">VP Sales too early<\u002Fspan> — VPs multiply systems. No system = they quit in 12 months. <span style=\"color:#FF8A3D; font-weight: 700;\">Wait for €3–5M ARR.<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex; gap: 16px; padding: 13px 18px; border: 1px solid rgba(245,241,234,0.1); border-radius: 10px; background: rgba(255,255,255,0.02);\">\n              <div style=\"color:#FF8A3D; font-size: 22px; font-weight: 900; line-height: 1; font-variant-numeric: tabular-nums; min-width: 28px;\">02<\u002Fdiv>\n              <div style=\"font-size: 15px; line-height: 1.38;\"><span style=\"font-weight: 800;\">Outsourcing SDRs before you’ve done it yourself<\u002Fspan> — you miss the <span style=\"color:#F5F1EA; font-weight: 700;\">100 objections<\u002Fspan> you should have heard.<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex; gap: 16px; padding: 13px 18px; border: 1px solid rgba(245,241,234,0.1); border-radius: 10px; background: rgba(255,255,255,0.02);\">\n              <div style=\"color:#FF8A3D; font-size: 22px; font-weight: 900; line-height: 1; font-variant-numeric: tabular-nums; min-width: 28px;\">03<\u002Fdiv>\n              <div style=\"font-size: 15px; line-height: 1.38;\"><span style=\"font-weight: 800;\">Marketing Manager FTE before a content engine exists<\u002Fspan> — they <em style=\"font-style: normal; color:#F5F1EA; font-weight: 700;\">plan<\u002Fem> instead of build.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Monday Action -->\n        <div style=\"padding: 22px 24px; border-radius: 14px; background: linear-gradient(135deg, rgba(255,138,61,0.16), rgba(182,66,140,0.10) 65%, rgba(43,26,74,0.14)); border: 1px solid rgba(255,138,61,0.30); display:flex; flex-direction:column; justify-content:center;\">\n          <div style=\"color:#FF8A3D; font-size: 12px; letter-spacing: 0.24em; text-transform: uppercase; font-weight: 800; margin-bottom: 10px;\">Monday action<\u002Fdiv>\n          <div style=\"font-size: 20px; line-height: 1.35; font-weight: 600; letter-spacing: -0.004em;\">\n            Check your ARR against the map. If you hired too early — <span style=\"color:#F5F1EA; font-weight: 800;\">it’s a fire-fast moment.<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"margin-top: 12px; padding-top: 12px; border-top: 1px dashed rgba(245,241,234,0.2); font-size: 16px; line-height: 1.4; color: rgba(245,241,234,0.78); font-style: italic;\">\n            Hiring slowly is cheap. Firing fast is cheaper.\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 24. Three
